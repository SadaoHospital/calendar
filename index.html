<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบปฏิทินผู้บริหาร รพ.สะเดา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>
    
    <style>
        body { background: radial-gradient(circle at top left, #ffffff 60%, #f0f9ff 90%, #e0f2fe 100%); min-height: 100vh; }
        .glass-master { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 20px 50px rgba(59, 130, 246, 0.08); }
        .btn-3d { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35); transition: all 0.2s; }
        .btn-3d:active { transform: scale(0.96); }
        .calendar-cell { cursor: pointer; transition: all 0.2s; }
        .calendar-cell:hover { background-color: #eff6ff; }
        .calendar-cell.active { background-color: #dbeafe; border-color: #3b82f6; }
        .hide-scroll::-webkit-scrollbar { width: 4px; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-3 md:p-6 text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto glass-master rounded-[32px] p-4 md:p-8 mt-2">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6 pb-6 border-b border-blue-100/50">
            <div class="flex items-center gap-4">
                <img src="https://github.com/SadaoHospital/calendar/blob/Img/%E0%B9%82%E0%B8%A3%E0%B8%87%E0%B8%9E%E0%B8%A2%E0%B8%B2%E0%B8%9A%E0%B8%B2%E0%B8%A5%20%E0%B8%AA%E0%B8%B0%E0%B9%80%E0%B8%94%E0%B8%B2%20-%20Copy.png?raw=true" class="w-14 h-14 object-contain">
                <div>
                    <h1 class="text-2xl font-black text-gray-800">ระบบปฏิทินผู้บริหาร</h1>
                    <p class="text-xs font-bold text-blue-500 uppercase">Sadao Hospital Dashboard</p>
                </div>
            </div>
            <button onclick="openModal()" class="px-6 py-3 rounded-2xl btn-3d text-white font-bold flex items-center gap-2">➕ บันทึกงานใหม่</button>
        </div>

        <div id="dashboardArea">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div id="calendarContainer"></div>

                <div id="dayDetailPanel" class="bg-white/50 p-6 rounded-3xl border border-gray-100 shadow-inner">
                    <h3 id="selectedDateTitle" class="text-lg font-black text-gray-800 mb-4">กรุณาเลือกวันที่...</h3>
                    <div id="eventRichCards" class="space-y-4">
                        <p class="text-gray-400 text-sm">คลิกที่วันที่ในปฏิทินเพื่อดูรายละเอียดงานครับ</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="eventModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[32px] shadow-2xl w-full max-w-lg p-8 modal-enter">
            <h2 class="text-xl font-black mb-4">เพิ่มตารางงานใหม่</h2>
            <form id="eventForm" onsubmit="saveEvent(event)" class="space-y-4">
                <select id="modalExecSelect" required class="w-full p-3 rounded-xl border border-gray-200">
                    <option value="">-- เลือกผู้บริหาร --</option>
                </select>
                <input type="text" id="eventTitle" placeholder="ชื่อกิจกรรม" required class="w-full p-3 rounded-xl border border-gray-200">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="eventDate" placeholder="วันที่" required class="w-full p-3 rounded-xl border border-gray-200 bg-white">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="eventTimeStart" placeholder="เริ่ม" required class="w-full p-3 rounded-xl border border-gray-200 bg-white">
                        <input type="text" id="eventTimeEnd" placeholder="จบ" required class="w-full p-3 rounded-xl border border-gray-200 bg-white">
                    </div>
                </div>
                <input type="text" id="eventRoom" placeholder="สถานที่" required class="w-full p-3 rounded-xl border border-gray-200">
                <button type="submit" id="submitBtn" class="w-full py-3 btn-3d text-white font-bold rounded-xl">ยืนยัน</button>
            </form>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/";
        let allEventsData = [];
        let currentDisplayDate = new Date();
        let fpDate, fpTimeStart, fpTimeEnd;

        async function initialize() {
            initFlatpickr();
            await fetchEvents();
            renderMonthlyCalendar();
        }

        function initFlatpickr() {
            fpDate = flatpickr("#eventDate", { locale: "th", altInput: true, altFormat: "d/m/Y", dateFormat: "Y-m-d" });
            fpTimeStart = flatpickr("#eventTimeStart", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true });
            fpTimeEnd = flatpickr("#eventTimeEnd", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true });
        }

        async function fetchEvents() {
            let res = await fetch(FIREBASE_URL + "sadaoExecCalendar/events.json");
            let data = await res.json();
            allEventsData = data ? Object.values(data) : [];
            renderMonthlyCalendar();
        }

        function renderMonthlyCalendar() {
            const container = document.getElementById("calendarContainer");
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();

            let html = `<div class="grid grid-cols-7 gap-2 mb-2 text-center text-xs font-black"><div>อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div>ส</div></div>`;
            html += `<div class="grid grid-cols-7 gap-2">`;
            
            for(let i=0; i<firstDay; i++) html += `<div></div>`;
            
            for(let day=1; day<=daysInMonth; day++) {
                let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                let count = allEventsData.filter(e => e.date === dateStr).length;
                html += `<div onclick="showDayDetails('${dateStr}')" class="calendar-cell p-2 border rounded-xl bg-white flex flex-col items-center">
                            <span class="font-bold text-sm">${day}</span>
                            ${count > 0 ? `<span class="text-[9px] bg-blue-100 text-blue-600 px-1 rounded">${count} งาน</span>` : ''}
                        </div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function showDayDetails(dateStr) {
            document.getElementById('selectedDateTitle').innerText = "ตารางงานวันที่ " + dateStr;
            const events = allEventsData.filter(e => e.date === dateStr);
            const panel = document.getElementById('eventRichCards');
            
            if(events.length === 0) {
                panel.innerHTML = `<p class="text-gray-400">ไม่มีตารางงานในวันนี้</p>`;
            } else {
                panel.innerHTML = events.map(ev => `
                    <div class="event-card p-4 border-l-4 border-blue-500">
                        <div class="flex items-center gap-3">
                            <img src="${ev.avatar || 'https://ui-avatars.com/api/?name='+ev.execName}" class="w-10 h-10 rounded-full">
                            <div>
                                <p class="font-bold text-sm">${ev.title}</p>
                                <p class="text-xs text-gray-500">⏰ ${ev.timeStart || '--:--'} - ${ev.timeEnd || '--:--'} น. | 📍 ${ev.room}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Modal Logic
        function openModal() { document.getElementById('eventModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('eventModal').classList.add('hidden'); }
        async function saveEvent(e) {
            e.preventDefault();
            // ... (โค้ด save เหมือนเดิม) ...
            // เพิ่ม fetchEvents() และ closeModal() หลังเซฟ
        }

        window.onload = initialize;
    </script>
</body>
</html>

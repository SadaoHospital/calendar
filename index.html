<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปฏิทินผู้บริหาร - รพ.สะเดา</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f4f7f6;
            background-image: radial-gradient(circle at top right, #e0f2fe 0%, #f4f7f6 40%);
            background-attachment: fixed;
        }

        /* 🌟 เอฟเฟกต์กระจก (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.2s ease-in-out;
        }
        
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        /* 📌 หัวใจสำคัญ: แถบเดือนติดหนึบ (Sticky Header) */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50; /* ให้อยู่บนสุดเสมอ */
            /* ทำให้พื้นหลังส่วนหัวเป็นกระจกเบลอๆ เวลาเลื่อนทับการ์ดจะได้สวยๆ */
            background: rgba(244, 247, 246, 0.85); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding-top: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(200, 200, 200, 0.2);
            margin-bottom: 1rem;
        }

        /* ตกแต่งแถบสีด้านบนของการ์ดแต่ละวัน */
        .day-border-0 { border-top: 4px solid #ef4444; } /* อาทิตย์ - แดง */
        .day-border-1 { border-top: 4px solid #f59e0b; } /* จันทร์ - เหลือง */
        .day-border-2 { border-top: 4px solid #ec4899; } /* อังคาร - ชมพู */
        .day-border-3 { border-top: 4px solid #10b981; } /* พุธ - เขียว */
        .day-border-4 { border-top: 4px solid #f97316; } /* พฤหัส - ส้ม */
        .day-border-5 { border-top: 4px solid #3b82f6; } /* ศุกร์ - ฟ้า */
        .day-border-6 { border-top: 4px solid #8b5cf6; } /* เสาร์ - ม่วง */

        /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-gray-800">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
        
        <div class="sticky-header rounded-b-xl">
            <div class="flex justify-between items-center mb-4 px-2">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-3">
                        <i class="fa-regular fa-calendar-days text-blue-500"></i>
                        ปฏิทินผู้บริหาร
                    </h1>
                    <p class="text-gray-500 text-sm mt-1" id="current-month-display">กำลังโหลดข้อมูลเดือน...</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="loadPreviousMonth()" class="p-2 rounded-full hover:bg-white/50 text-gray-600 transition"><i class="fa-solid fa-chevron-left"></i></button>
                    <button onclick="resetToToday()" class="px-4 py-2 rounded-full bg-blue-50 hover:bg-blue-100 text-blue-600 text-sm font-medium transition">วันนี้</button>
                    <button onclick="loadNextMonth()" class="p-2 rounded-full hover:bg-white/50 text-gray-600 transition"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-4 text-center font-semibold text-gray-500 text-sm">
                <div class="text-red-500">อา.</div>
                <div class="text-yellow-600">จ.</div>
                <div class="text-pink-500">อ.</div>
                <div class="text-green-600">พ.</div>
                <div class="text-orange-500">พฤ.</div>
                <div class="text-blue-500">ศ.</div>
                <div class="text-purple-500">ส.</div>
            </div>
        </div>

        <div id="calendar-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
            <div class="col-span-7 text-center py-20 text-gray-400">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-blue-400"></i>
                <p>กำลังเชื่อมต่อฐานข้อมูล...</p>
            </div>
        </div>

    </div>

    <script>
        // ใส่ URL Firebase ของคุณพิง
        const FIREBASE_URL = "https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/sadaoExecCalendar/events.json?auth=c0RJi6FNEQfcCur7GddJ12QbleXtzLneiVwNBaeP";
        
        let currentDate = new Date();
        let eventsData = {};

        // ฟังก์ชันเริ่มทำงานเมื่อโหลดหน้าเว็บ
        window.onload = async () => {
            await fetchEvents();
            renderCalendar();
        };

        // 1. ดึงข้อมูลจาก Firebase
        async function fetchEvents() {
            try {
                const response = await fetch(FIREBASE_URL);
                eventsData = await response.json() || {};
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('calendar-grid').innerHTML = `<div class="col-span-7 text-center py-20 text-red-500"><i class="fa-solid fa-triangle-exclamation text-3xl mb-3"></i><p>ไม่สามารถเชื่อมต่อฐานข้อมูลได้</p></div>`;
            }
        }

        // 2. สร้างหน้าปฏิทิน
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = ''; // ล้างข้อมูลเก่า
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // แสดงชื่อเดือนภาษาไทย
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            document.getElementById('current-month-display').innerText = `เดือน ${monthNames[month]} ${year + 543}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();

            // จัดกลุ่มงานตามวันที่
            const eventsByDate = {};
            for (let key in eventsData) {
                const ev = eventsData[key];
                if (!eventsByDate[ev.date]) eventsByDate[ev.date] = [];
                eventsByDate[ev.date].push(ev);
            }

            // สร้างช่องว่างสำหรับวันก่อนหน้าของเดือน (ให้ตรงกับวัน จ.-อา.)
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="p-2"></div>`;
            }

            // สร้างการ์ดแต่ละวัน
            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayOfWeek = new Date(year, month, day).getDay();
                
                // ตรวจสอบว่าเป็นวันนี้หรือไม่
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                
                // ดึงงานของวันนี้มาเรียงตามเวลา
                let dailyEvents = eventsByDate[dateString] || [];
                dailyEvents.sort((a, b) => a.timeStart.localeCompare(b.timeStart));
                
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                let dayBadge = isWeekend ? `<span class="bg-blue-400 text-white text-[10px] px-2 py-0.5 rounded shadow-sm"><i class="fa-solid fa-bed"></i> วันหยุด</span>` : '';
                if(isToday) dayBadge = `<span class="bg-amber-400 text-white text-[10px] px-2 py-0.5 rounded shadow-sm">วันนี้</span>`;

                // โครงสร้างกล่องของแต่วัน
                let dayHTML = `
                    <div class="glass-card rounded-xl flex flex-col day-border-${dayOfWeek} min-h-[160px]">
                        <div class="p-3 flex justify-between items-start border-b border-gray-100/50">
                            <div class="flex items-center gap-2">
                                <span class="text-2xl font-bold ${isWeekend ? 'text-red-500' : 'text-gray-700'}">${day}</span>
                                ${dayBadge}
                            </div>
                            <span class="bg-gray-100/80 text-gray-500 text-[10px] px-2 py-1 rounded-md font-medium border border-gray-200">${dailyEvents.length} งาน</span>
                        </div>
                        <div class="p-2 flex-1 flex flex-col gap-2 overflow-y-auto max-h-[300px]">
                `;

                // ถ้ามีงาน ให้วนลูปสร้างการ์ดงาน
                if (dailyEvents.length > 0) {
                    dailyEvents.forEach(ev => {
                        // รูปแบบสีตามความสำคัญ
                        let priorityStyle = "bg-green-50 text-green-600 border-green-100";
                        if(ev.priority === "สำคัญ") priorityStyle = "bg-amber-50 text-amber-600 border-amber-100";
                        if(ev.priority === "ด่วนที่สุด") priorityStyle = "bg-red-50 text-red-600 border-red-100";

                        dayHTML += `
                            <div class="bg-white/80 rounded-lg p-2 border border-white/60 shadow-sm text-xs relative group cursor-pointer hover:bg-blue-50 transition">
                                <div class="flex items-center gap-2 mb-1">
                                    <img src="${ev.avatar}" class="w-5 h-5 rounded-full border border-gray-200">
                                    <span class="font-medium text-blue-700 truncate w-full">${ev.execName}</span>
                                    <span class="${priorityStyle} text-[8px] px-1.5 py-0.5 rounded border whitespace-nowrap">${ev.priority || 'ทั่วไป'}</span>
                                </div>
                                <div class="text-gray-700 font-medium leading-tight mb-1 pl-7 line-clamp-2">${ev.title}</div>
                                <div class="text-gray-400 text-[10px] pl-7 flex items-center gap-1">
                                    <i class="fa-regular fa-clock"></i> ${ev.timeStart} - ${ev.timeEnd}
                                </div>
                            </div>
                        `;
                    });
                } else {
                    dayHTML += `<div class="flex-1 flex items-center justify-center text-gray-300 text-xs py-4">ว่าง</div>`;
                }

                dayHTML += `</div></div>`;
                grid.innerHTML += dayHTML;
            }
        }

        // ฟังก์ชันเปลี่ยนเดือน
        function loadPreviousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function loadNextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        function resetToToday() {
            currentDate = new Date();
            renderCalendar();
        }
    </script>
</body>
</html>

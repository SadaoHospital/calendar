<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadao Hospital Executive Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>
    
    <style>
        body { background: #f8fafc; font-family: 'Sarabun', sans-serif; }
        .glass-master { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .btn-3d { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.2s; }
        .btn-3d:active { transform: scale(0.98); }
        /* 🟢 ไฮไลท์สีทองวันนี้ */
        .today-card-glow { border: 2px solid #fbbf24 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.6); }
        .hide-scroll::-webkit-scrollbar { width: 4px; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6 text-slate-800">

    <div class="max-w-[1400px] mx-auto glass-master rounded-[32px] p-6 shadow-xl">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-4">
                <img src="https://github.com/SadaoHospital/calendar/blob/Img/%E0%B9%82%E0%B8%A3%E0%B8%87%E0%B8%9E%E0%B8%A2%E0%B8%B2%E0%B8%9A%E0%B8%B2%E0%B8%A5%20%E0%B8%AA%E0%B8%B0%E0%B9%80%E0%B8%94%E0%B8%B2%20-%20Copy.png?raw=true" class="w-12 h-12 object-contain">
                <div>
                    <h1 class="text-xl font-black">ระบบปฏิทินผู้บริหาร</h1>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="changeMonth(-1)" class="p-2 rounded-lg bg-gray-100 hover:bg-blue-100">⬅️</button>
                <span id="monthTitle" class="font-black text-blue-800 self-center w-40 text-center">...</span>
                <button onclick="changeMonth(1)" class="p-2 rounded-lg bg-gray-100 hover:bg-blue-100">➡️</button>
                <button onclick="goToToday()" class="px-4 py-2 bg-amber-500 text-white font-bold rounded-lg text-sm">วันนี้</button>
            </div>
            <button onclick="openModal()" class="px-6 py-3 btn-3d text-white font-bold rounded-2xl">➕ เพิ่มตารางงาน</button>
        </div>

        <div class="grid grid-cols-7 gap-2 mb-2 text-center font-bold text-sm">
            <div class="text-red-500">อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div class="text-purple-600">ส</div>
        </div>
        <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
    </div>

    <div id="eventModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-black mb-4">บันทึกภารกิจ</h2>
            <form id="eventForm" onsubmit="saveEvent(event)" class="space-y-4">
                <select id="modalExecSelect" required class="w-full p-3 rounded-xl border border-gray-200"></select>
                <input type="text" id="eventTitle" placeholder="หัวข้อภารกิจ" required class="w-full p-3 rounded-xl border border-gray-200">
                <input type="text" id="eventDate" placeholder="เลือกระยะเวลา (วันที่)" required class="w-full p-3 rounded-xl border border-gray-200">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="eventTimeStart" placeholder="เวลาเริ่ม" required class="w-full p-3 rounded-xl border border-gray-200">
                    <input type="text" id="eventTimeEnd" placeholder="เวลาจบ" required class="w-full p-3 rounded-xl border border-gray-200">
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="isPrivate" class="w-5 h-5"> <label>โหมดส่วนตัว (คนอื่นเห็นแค่ "ติดภารกิจ")</label>
                </div>
                <button type="submit" class="w-full py-3 btn-3d text-white font-bold rounded-xl">ยืนยันการบันทึก</button>
            </form>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/";
        let allEvents = [];
        let currentDisplayDate = new Date();

        async function initialize() {
            flatpickr("#eventDate", { locale: "th", altInput: true, altFormat: "d/m/Y", dateFormat: "Y-m-d", mode: "range" });
            flatpickr("#eventTimeStart", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true });
            flatpickr("#eventTimeEnd", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true });
            
            let res = await fetch(FIREBASE_URL + "sadaoExecCalendar/events.json");
            let data = await res.json();
            allEvents = data ? Object.values(data) : [];
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById("calendarGrid");
            grid.innerHTML = "";
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            document.getElementById("monthTitle").innerText = `${["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"][month]} ${year+543}`;

            for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement("div"));

            for(let day=1; day<=daysInMonth; day++) {
                let dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                let isToday = (new Date().toISOString().split('T')[0] === dStr);
                let dayEvents = allEvents.filter(e => e.date === dStr);
                
                let cell = document.createElement("div");
                cell.className = `calendar-cell rounded-2xl p-2 ${isToday ? 'today-card-glow' : ''}`;
                cell.innerHTML = `<p class="font-black text-lg ${isToday ? 'text-amber-500' : ''}">${day}</p>`;
                
                dayEvents.forEach(ev => {
                    // Logic ความเป็นส่วนตัว
                    let title = (ev.isPrivate && ev.uid !== "CURRENT_USER_ID_PLACEHOLDER") ? "🚫 ติดภารกิจ" : ev.title;
                    cell.innerHTML += `<div class="event-chip bg-blue-100 text-blue-700 font-bold truncate mt-1 text-[9px] p-1 rounded">${ev.timeStart} ${title}</div>`;
                });
                grid.appendChild(cell);
            }
        }

        function changeMonth(n) { currentDisplayDate.setMonth(currentDisplayDate.getMonth()+n); renderGrid(); }
        function goToToday() { currentDisplayDate = new Date(); renderGrid(); }
        function openModal() { document.getElementById('eventModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('eventModal').classList.add('hidden'); }
        
        async function saveEvent(e) {
            e.preventDefault();
            // ... Logic บันทึกเหมือนเดิม ...
            Swal.fire('บันทึกแล้ว', '', 'success');
            closeModal();
        }

        window.onload = initialize;
    </script>
</body>
</html>

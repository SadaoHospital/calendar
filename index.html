<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=3.0">
    <title>ระบบปฏิทินผู้บริหาร รพ.สะเดา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body {
            background: radial-gradient(circle at top left, #ffffff 60%, #f0f9ff 90%, #e0f2fe 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass-master {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.08);
        }
        .event-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid #f3f4f6;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }
        .event-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }
        .btn-3d {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .btn-3d:active {
            transform: scale(0.98);
        }
        .hide-scroll::-webkit-scrollbar { width: 4px; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        
        /* แอนิเมชันสำหรับ Modal */
        .modal-enter { animation: modalFadeIn 0.3s ease-out forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(-10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="p-3 md:p-6 text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto glass-master rounded-[32px] p-4 md:p-8 mt-2 relative">
        
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 pb-6 border-b border-blue-100/50">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-sm overflow-hidden border border-gray-100 p-1">
                    <img src="https://github.com/SadaoHospital/calendar/blob/Img/%E0%B9%82%E0%B8%A3%E0%B8%87%E0%B8%9E%E0%B8%A2%E0%B8%B2%E0%B8%9A%E0%B8%B2%E0%B8%A5%20%E0%B8%AA%E0%B8%B0%E0%B9%80%E0%B8%94%E0%B8%B2%20-%20Copy.png?raw=true" alt="Sadao Hospital Logo" class="w-full h-full object-contain">
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-black tracking-tight text-gray-800">ระบบปฏิทินผู้บริหาร</h1>
                    <p class="text-xs md:text-sm font-bold text-blue-500 tracking-widest uppercase mt-0.5">Sadao Hospital Dashboard</p>
                </div>
            </div>
            <div id="profileBox" class="hidden items-center gap-3 bg-white p-2 pr-5 rounded-full border border-gray-100 shadow-sm">
                <img id="pictureUrl" src="" alt="User Profile" class="w-10 h-10 rounded-full border-2 border-blue-100 shadow-sm">
                <span id="displayName" class="text-sm font-bold text-gray-700">กำลังโหลด...</span>
            </div>
        </div>

        <div id="loading" class="text-center py-12 animate-pulse text-blue-500 font-bold tracking-wide">
            🌀 กำลังจัดเรียงตารางงาน...
        </div>

        <div id="dashboardArea" class="hidden">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <div class="bg-white/80 p-4 rounded-2xl border border-gray-100 shadow-sm">
                    <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5 pl-1">📌 ตัวกรองผู้บริหาร:</label>
                    <select id="execSelect" class="w-full p-3.5 rounded-xl bg-gray-50 border border-gray-200 text-sm font-bold text-gray-700 focus:outline-none focus:border-blue-400 focus:bg-white transition-colors cursor-pointer appearance-none">
                        <option value="">-- แสดงตารางงานของผู้บริหารทั้งหมด --</option>
                    </select>
                </div>
                <div class="flex items-center justify-end">
                    <button onclick="openModal()" class="w-full md:w-auto px-8 py-4 rounded-2xl btn-3d text-white text-sm font-bold tracking-wide transition-all flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        บันทึกตารางงานใหม่
                    </button>
                </div>
            </div>

            <div id="calendarGridBox" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>

        </div>
    </div>

    <div id="eventModal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden modal-enter">
            <div class="bg-gradient-to-r from-blue-600 to-blue-400 px-6 py-4 flex justify-between items-center">
                <h3 class="text-white font-bold text-lg flex items-center gap-2">📅 บันทึกตารางงานนัดหมาย</h3>
                <button onclick="closeModal()" class="text-white/80 hover:text-white text-xl leading-none">&times;</button>
            </div>
            <form id="eventForm" onsubmit="saveEvent(event)" class="p-6 space-y-4">
                
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">ผู้บริหารที่รับผิดชอบ <span class="text-red-500">*</span></label>
                    <select id="modalExecSelect" required class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:outline-none focus:border-blue-400">
                        <option value="">-- เลือกผู้บริหาร --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">หัวข้อภารกิจ/กิจกรรม <span class="text-red-500">*</span></label>
                    <input type="text" id="eventTitle" required placeholder="เช่น ประชุมบอร์ดบริหาร, ลงพื้นที่ตรวจเยี่ยม" class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:outline-none focus:border-blue-400">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">วันที่ <span class="text-red-500">*</span></label>
                        <input type="date" id="eventDate" required class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:outline-none focus:border-blue-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">เวลา (เริ่มต้น) <span class="text-red-500">*</span></label>
                        <input type="time" id="eventTime" required class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:outline-none focus:border-blue-400">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">สถานที่ <span class="text-red-500">*</span></label>
                        <input type="text" id="eventRoom" required placeholder="ระบุห้องหรือสถานที่" class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:outline-none focus:border-blue-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">ระดับความสำคัญ <span class="text-red-500">*</span></label>
                        <select id="eventPriority" required class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 text-sm focus:outline-none focus:border-blue-400">
                            <option value="ทั่วไป">🟢 ทั่วไป</option>
                            <option value="สำคัญ">🟠 สำคัญ</option>
                            <option value="ด่วนที่สุด">🔴 ด่วนที่สุด</option>
                        </select>
                    </div>
                </div>

                <div class="pt-4 flex justify-end gap-3 border-t border-gray-100 mt-6">
                    <button type="button" onclick="closeModal()" class="px-5 py-2.5 rounded-xl font-bold text-gray-500 bg-gray-100 hover:bg-gray-200 transition-colors text-sm">ยกเลิก</button>
                    <button type="submit" id="submitBtn" class="px-6 py-2.5 rounded-xl font-bold text-white btn-3d text-sm flex items-center gap-2">
                        💾 บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = "2010128406-pWJYT2lK"; 
        const FIREBASE_URL = "https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/";

        async function initializeLiff() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                document.getElementById("loading").classList.add("hidden");

                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById("profileBox").classList.remove("hidden");
                    document.getElementById("profileBox").classList.add("flex");
                    document.getElementById("dashboardArea").classList.remove("hidden");
                    
                    document.getElementById("pictureUrl").src = profile.pictureUrl;
                    document.getElementById("displayName").innerText = profile.displayName;

                    fetchExecutives();
                    generateMockCalendarCards(); // วาดตารางจำลองไปก่อน
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF Init Error", err);
                document.getElementById("loading").innerText = "เกิดข้อผิดพลาด: " + err.message;
            }
        }

        async function fetchExecutives() {
            try {
                let response = await fetch(FIREBASE_URL + "sadaoExecCalendar/executives.json");
                let data = await response.json();
                
                let selectMain = document.getElementById("execSelect");
                let selectModal = document.getElementById("modalExecSelect");

                if(data) {
                    for (let uid in data) {
                        let exec = data[uid];
                        let optionText = exec.position + " ➔ " + exec.fullName;
                        
                        // ใส่ Dropdown หน้าหลัก
                        let opt1 = document.createElement("option");
                        opt1.value = uid; opt1.innerText = optionText;
                        selectMain.appendChild(opt1);

                        // ใส่ Dropdown ในหน้าต่างบันทึกงาน
                        let opt2 = document.createElement("option");
                        opt2.value = uid; opt2.innerText = optionText;
                        // แอบเก็บชื่อและตำแหน่งซ่อนไว้ เผื่อดึงไปบันทึก
                        opt2.dataset.fullname = exec.fullName;
                        opt2.dataset.position = exec.position;
                        selectModal.appendChild(opt2);
                    }
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        // 🟢 ฟังก์ชันเปิด-ปิด Modal
        function openModal() {
            document.getElementById('eventModal').classList.remove('hidden');
            // ตั้งค่าวันที่ให้เป็นวันนี้อัตโนมัติ
            document.getElementById('eventDate').valueAsDate = new Date();
        }
        function closeModal() {
            document.getElementById('eventModal').classList.add('hidden');
            document.getElementById('eventForm').reset(); // ล้างข้อมูล
        }

        // 🟢 ฟังก์ชันส่งข้อมูลเข้า Firebase
        async function saveEvent(e) {
            e.preventDefault(); // หยุดการรีเฟรชหน้าเว็บตอนกด submit
            
            // เปลี่ยนปุ่มเป็นกำลังโหลด
            const submitBtn = document.getElementById('submitBtn');
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '⏳ กำลังบันทึก...';
            submitBtn.disabled = true;

            // ดึงข้อมูลจากฟอร์ม
            const selectModal = document.getElementById('modalExecSelect');
            const selectedOption = selectModal.options[selectModal.selectedIndex];
            
            const newEvent = {
                uid: selectModal.value,
                execName: selectedOption.dataset.fullname,
                execPosition: selectedOption.dataset.position,
                title: document.getElementById('eventTitle').value,
                date: document.getElementById('eventDate').value,
                time: document.getElementById('eventTime').value,
                room: document.getElementById('eventRoom').value,
                priority: document.getElementById('eventPriority').value,
                timestamp: new Date().toISOString()
            };

            try {
                // ยิงข้อมูลไปเก็บที่โฟลเดอร์ events ใน Firebase ด้วยเมธอด POST (สุ่มรหัสงานอัตโนมัติ)
                const response = await fetch(FIREBASE_URL + "sadaoExecCalendar/events.json", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newEvent)
                });

                if (response.ok) {
                    closeModal(); // ปิดหน้าต่าง
                    // แจ้งเตือนสวยๆ ด้วย SweetAlert2
                    Swal.fire({
                        title: 'บันทึกสำเร็จ!',
                        text: 'เพิ่มตารางงานเข้าสู่ระบบเรียบร้อยแล้ว',
                        icon: 'success',
                        confirmButtonColor: '#3b82f6'
                    });
                } else {
                    throw new Error("บันทึกไม่สำเร็จ");
                }
            } catch (error) {
                Swal.fire('ข้อผิดพลาด', error.message, 'error');
            } finally {
                // คืนค่าปุ่มกลับมาเหมือนเดิม
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            }
        }

        // ฟังก์ชันวาดการ์ด (โครงเดิม ใช้โชว์ให้หน้าเว็บไม่โล่ง)
        function generateMockCalendarCards() {
            const gridBox = document.getElementById("calendarGridBox");
            gridBox.innerHTML = "";
            const mockDays = [
                { 
                    dateNum: "18", monthYear: "พ.ค. 2569", dayName: "วันจันทร์", 
                    borderColor: "border-t-yellow-400", dateColor: "text-yellow-500", bgColor: "bg-yellow-50/50",
                    events: [
                        { time: "09:00", title: "ประชุมบอร์ดบริหาร รพ. ประจำเดือน", person: "นพ.ทดสอบ (ผอ.)", room: "ห้องประชุมไพทูรย์", priority: "ด่วนที่สุด", priorityClass: "bg-red-100 text-red-600", avatar: "https://i.pravatar.cc/150?u=a042581f4e29026704d" },
                    ]
                },
                { 
                    dateNum: "19", monthYear: "พ.ค. 2569", dayName: "วันอังคาร", 
                    borderColor: "border-t-pink-400", dateColor: "text-pink-500", bgColor: "bg-pink-50/50",
                    events: [
                        { time: "08:30", title: "ลงพื้นที่ศูนย์แพทย์ชุมชนเมือง", person: "นพ.ทดสอบ (ผอ.)", room: "ศสม.สะเดา", priority: "สำคัญ", priorityClass: "bg-orange-100 text-orange-600", avatar: "https://i.pravatar.cc/150?u=a042581f4e29026704d" },
                    ]
                }
            ];
            mockDays.forEach(day => {
                let cardHTML = `<div class="event-card border-t-4 ${day.borderColor} flex flex-col max-h-[400px]">
                        <div class="px-5 py-4 ${day.bgColor} border-b border-gray-100 flex items-center justify-between sticky top-0 z-10">
                            <div class="flex items-baseline gap-2">
                                <span class="text-3xl font-black ${day.dateColor} tracking-tighter">${day.dateNum}</span>
                                <div class="flex flex-col"><span class="text-xs font-bold text-gray-700">${day.monthYear}</span><span class="text-[10px] font-bold text-gray-400">${day.dayName}</span></div>
                            </div>
                            <span class="text-xs font-bold text-gray-400 bg-white px-2 py-1 rounded-lg shadow-sm border border-gray-100">${day.events.length} ภารกิจ</span>
                        </div>
                        <div class="p-3 overflow-y-auto hide-scroll flex-1 space-y-2">`;
                day.events.forEach(ev => {
                    cardHTML += `<div class="flex items-start gap-3 p-3 bg-white hover:bg-gray-50 border border-gray-100 rounded-xl cursor-pointer group">
                            <div class="relative shrink-0 mt-0.5"><img src="${ev.avatar}" alt="Avatar" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover"></div>
                            <div class="flex-1 min-w-0">
                                <div class="flex flex-wrap justify-between items-start gap-1 mb-1"><h5 class="text-[13px] font-bold text-gray-800 leading-tight truncate pr-2">${ev.title}</h5><span class="shrink-0 text-[9px] font-bold px-1.5 py-0.5 rounded ${ev.priorityClass}">${ev.priority}</span></div>
                                <p class="text-[11px] font-semibold text-blue-600 mb-1.5 truncate">${ev.person}</p>
                                <div class="flex items-center gap-3 text-[10px] font-medium text-gray-500"><span class="flex items-center gap-1 bg-gray-100/80 px-1.5 py-0.5 rounded">⏰ ${ev.time}</span><span class="flex items-center gap-1 truncate">📍 ${ev.room}</span></div>
                            </div></div>`;
                });
                cardHTML += `</div></div>`;
                gridBox.innerHTML += cardHTML;
            });
        }
        window.onload = initializeLiff;
    </script>
</body>
</html>

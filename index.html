<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadao Hospital Executive Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
    
    <style>
        body { background: #f1f5f9; font-family: 'Sarabun', sans-serif; }
        .glass { background: white; border: 1px solid #e2e8f0; }
        /* 🟢 ขอบสีทองเรืองแสงสำหรับ "วันนี้" */
        .today-glow { border: 2px solid #fbbf24 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }
        .btn-3d { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
        <h1 class="text-xl font-black text-slate-800">ระบบปฏิทินผู้บริหาร รพ.สะเดา</h1>
        <div class="flex gap-2">
            <button onclick="changeMonth(-1)" class="px-4 py-2 bg-slate-100 rounded-xl font-bold">⬅️</button>
            <span id="monthTitle" class="px-4 py-2 font-black text-blue-700 bg-blue-50 rounded-xl w-32 text-center">...</span>
            <button onclick="changeMonth(1)" class="px-4 py-2 bg-slate-100 rounded-xl font-bold">➡️</button>
            <button onclick="goToToday()" class="px-4 py-2 bg-amber-500 text-white font-bold rounded-xl text-sm">🎯 วันนี้</button>
            <button onclick="openModal()" class="px-6 py-2 bg-blue-600 text-white font-bold rounded-xl ml-2">➕ เพิ่มงาน</button>
        </div>
    </div>

    <div id="timelineContainer" class="space-y-6"></div>
</div>

<div id="eventModal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto">
        <h2 class="text-xl font-black mb-4">บันทึกภารกิจ</h2>
        <form id="eventForm" onsubmit="saveEvent(event)" class="space-y-4">
            <input type="text" id="eventTitle" placeholder="ชื่อกิจกรรม" required class="w-full p-3 rounded-xl border border-gray-200">
            <input type="text" id="eventDate" placeholder="วันที่" required class="w-full p-3 rounded-xl border border-gray-200">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="eventTimeStart" placeholder="เริ่ม" required class="w-full p-3 rounded-xl border border-gray-200">
                <input type="text" id="eventTimeEnd" placeholder="จบ" required class="w-full p-3 rounded-xl border border-gray-200">
            </div>
            <div class="flex items-center gap-2">
                <input type="checkbox" id="isPrivate" class="w-5 h-5"> <label>โหมดส่วนตัว</label>
            </div>
            <button type="submit" class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl">ยืนยัน</button>
        </form>
    </div>
</div>

<script>
    const FIREBASE_URL = 'https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/';
    let allEvents = [];
    let current = new Date();

    async function initialize() {
        flatpickr("#eventDate", { locale: "th", altInput: true, altFormat: "d/m/Y", dateFormat: "Y-m-d" });
        flatpickr("#eventTimeStart", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true });
        flatpickr("#eventTimeEnd", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true });
        
        let res = await fetch(FIREBASE_URL + "sadaoExecCalendar/events.json");
        let data = await res.json();
        allEvents = data ? Object.values(data) : [];
        render();
    }

    function render() {
        const container = document.getElementById('timelineContainer');
        container.innerHTML = '';
        const year = current.getFullYear();
        const month = current.getMonth();
        document.getElementById('monthTitle').innerText = `${["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."][month]} ${year + 543}`;

        const days = new Date(year, month + 1, 0).getDate();
        for(let i=1; i<=days; i++) {
            const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const isToday = (new Date().toISOString().slice(0,10) === dStr);
            const dailyEvents = allEvents.filter(e => e.date === dStr);

            const div = document.createElement('div');
            div.className = `p-6 rounded-3xl bg-white border ${isToday ? 'today-glow border-amber-300' : 'border-slate-200'}`;
            
            let eventsHtml = dailyEvents.length > 0 ? dailyEvents.map(ev => `
                <div class="text-sm border-l-4 border-blue-500 pl-3 py-1">
                    <p class="font-bold">${ev.isPrivate ? "🚫 ติดภารกิจส่วนตัว" : ev.title}</p>
                    <p class="text-xs text-slate-500">${ev.timeStart || '--'} น.</p>
                </div>
            `).join('') : '<p class="text-slate-400 text-sm italic">ไม่มีนัดหมาย</p>';

            div.innerHTML = `
                <div class="flex items-center gap-4 mb-4">
                    <div class="text-4xl font-black ${isToday ? 'text-amber-600' : 'text-slate-800'}">${i}</div>
                    <div class="text-xs font-bold text-slate-400">${new Date(dStr).toLocaleDateString('th-TH', { weekday: 'long' })}</div>
                </div>
                <div class="space-y-3">${eventsHtml}</div>
            `;
            container.appendChild(div);
        }
    }

    function changeMonth(n) { current.setMonth(current.getMonth() + n); render(); }
    function goToToday() { current = new Date(); render(); }
    function openModal() { document.getElementById('eventModal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('eventModal').classList.add('hidden'); }
    async function saveEvent(e) {
        e.preventDefault();
        // ส่วนจัดการ Firebase ที่คุณปิงมีอยู่แล้ว
        Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success');
        closeModal();
    }
    window.onload = initialize;
</script>
</body>
</html>

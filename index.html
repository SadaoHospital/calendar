<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=3.0">
    <title>ระบบปฏิทินผู้บริหาร รพ.สะเดา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>
    
    <style>
        body {
            background: radial-gradient(circle at top left, #ffffff 60%, #f0f9ff 90%, #e0f2fe 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass-master {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.08);
        }
        .btn-3d {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .btn-3d:active { transform: scale(0.96); }
        .hide-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .modern-input {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .modern-input:focus, .modern-input.active {
            background: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        /* ตกแต่งตารางปฏิทินรายเดือน */
        .calendar-cell {
            min-height: 100px;
            transition: all 0.2s;
        }
        @media (max-width: 768px) {
            .calendar-cell { min-height: 80px; }
        }
        .calendar-cell:hover {
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
            border-color: #93c5fd;
            z-index: 10;
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            display: none; -webkit-appearance: none;
        }
    </style>
</head>
<body class="p-2 md:p-6 text-gray-800 font-sans">

    <div class="max-w-7xl mx-auto glass-master rounded-[32px] p-4 md:p-8 mt-2 relative overflow-hidden">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6 pb-6 border-b border-blue-100/50">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-sm overflow-hidden border border-gray-100 p-1 shrink-0">
                    <img src="https://github.com/SadaoHospital/calendar/blob/Img/%E0%B9%82%E0%B8%A3%E0%B8%87%E0%B8%9E%E0%B8%A2%E0%B8%B2%E0%B8%9A%E0%B8%B2%E0%B8%A5%20%E0%B8%AA%E0%B8%B0%E0%B9%80%E0%B8%94%E0%B8%B2%20-%20Copy.png?raw=true" alt="Sadao Hospital Logo" class="w-full h-full object-contain">
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-black tracking-tight text-gray-800">ระบบปฏิทินผู้บริหาร</h1>
                    <p class="text-xs md:text-sm font-bold text-blue-500 tracking-widest uppercase mt-0.5">Sadao Hospital Dashboard</p>
                </div>
            </div>
            <div id="profileBox" class="hidden items-center gap-3 bg-white p-2 pr-5 rounded-full border border-gray-100 shadow-sm shrink-0">
                <img id="pictureUrl" src="" alt="User Profile" class="w-10 h-10 rounded-full border-2 border-blue-100 shadow-sm object-cover">
                <span id="displayName" class="text-sm font-bold text-gray-700">กำลังโหลด...</span>
            </div>
        </div>

        <div id="loading" class="text-center py-12 animate-pulse text-blue-500 font-bold tracking-wide">
            🌀 กำลังเชื่อมต่อฐานข้อมูลอัจฉริยะ...
        </div>

        <div id="dashboardArea" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 items-end">
                <div class="md:col-span-2 bg-white/80 p-3 md:p-4 rounded-2xl border border-gray-100 shadow-sm">
                    <label class="block text-[11px] font-black text-slate-500 uppercase tracking-wider mb-1.5 pl-1">📌 ตัวกรองตารางงานผู้บริหาร:</label>
                    <select id="execSelect" class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 text-sm font-bold text-gray-700 focus:outline-none focus:border-blue-400 focus:bg-white transition-colors cursor-pointer appearance-none">
                        <option value="ALL">-- แสดงตารางงานของผู้บริหารทั้งหมด --</option>
                    </select>
                </div>
                <div class="flex items-center justify-end h-full">
                    <button onclick="openModal()" class="w-full md:w-auto px-6 py-4 rounded-2xl btn-3d text-white text-sm font-bold tracking-wide flex items-center justify-center gap-2 shadow-lg shadow-blue-500/30">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                        เพิ่มตารางงาน
                    </button>
                </div>
            </div>

            <div id="monthlyCalendarContainer" class="bg-white/60 backdrop-blur-sm rounded-3xl p-3 md:p-6 border border-white shadow-sm overflow-hidden">
                </div>
        </div>
    </div>

    <div id="eventModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 hidden flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white/95 backdrop-blur-xl rounded-[32px] shadow-2xl border border-white w-full max-w-xl overflow-visible modal-enter relative my-auto">
            
            <form id="eventForm" onsubmit="saveEvent(event)" class="relative z-10 flex flex-col h-full">
                <div class="px-8 pt-6 pb-2 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 shadow-inner">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <div>
                            <h3 class="text-xl font-black text-gray-800 tracking-tight">เพิ่มตารางงานใหม่</h3>
                            <p class="text-xs font-semibold text-blue-500">Smart Appointment Management</p>
                        </div>
                    </div>
                    <button type="button" onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-red-100 hover:text-red-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <div class="px-8 py-2 space-y-4">
                    
                    <div class="relative" id="dropdownContainer">
                        <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">ผู้บริหารที่รับผิดชอบ <span class="text-red-500">*</span></label>
                        <button type="button" id="dropdownTrigger" class="modern-input w-full pl-12 pr-4 py-3 rounded-2xl text-sm font-bold text-gray-700 text-left flex items-center justify-between shadow-sm">
                            <span id="dropdownSelectedText" class="text-gray-400 font-medium">-- เลือกผู้บริหาร --</span>
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                        <div class="absolute inset-y-0 left-0 top-[24px] flex items-center pl-4 pointer-events-none text-blue-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <div id="dropdownMenu" class="hidden absolute z-50 w-full mt-1 bg-white border border-gray-100 rounded-2xl shadow-xl max-h-48 overflow-y-auto hide-scroll"></div>
                    </div>

                    <div>
                        <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">หัวข้อภารกิจ/กิจกรรม <span class="text-red-500">*</span></label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-blue-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            </div>
                            <input type="text" id="eventTitle" required placeholder="ระบุชื่องาน (เช่น ประชุมบอร์ดบริหาร)" class="modern-input w-full pl-12 pr-4 py-3 rounded-2xl text-sm font-bold text-gray-800 outline-none shadow-sm">
                        </div>
                    </div>

                    <div class="flex items-center justify-between p-3 bg-blue-50/50 rounded-2xl border border-blue-100/50">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">📅</span>
                            <div class="flex flex-col">
                                <span class="text-xs font-bold text-slate-800">ภารกิจต่อเนื่องหลายวัน</span>
                                <span class="text-[10px] text-gray-400">เปิดเมื่อต้องการระบุช่วงวันเริ่มต้น - สิ้นสุด</span>
                            </div>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="multiDayToggle" class="sr-only peer" onchange="toggleDateMode(this.checked)">
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        </label>
                    </div>

                    <div>
                        <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1" id="dateLabel">ระบุวันที่ปฏิบัติงาน <span class="text-red-500">*</span></label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-blue-400 z-10">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            </div>
                            <input type="text" id="eventDate" required placeholder="คลิกเพื่อเลือกวันปฏิบัติงาน" class="modern-input w-full pl-12 pr-4 py-3 rounded-2xl text-sm font-bold text-gray-800 outline-none shadow-sm cursor-pointer bg-white">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">ประเภทช่วงเวลาปฏิบัติงาน</label>
                        <div class="grid grid-cols-4 gap-2 bg-gray-100 p-1 rounded-xl">
                            <button type="button" onclick="setTimeBlock('custom')" id="tb-custom" class="time-block-btn py-1.5 text-xs font-bold rounded-lg bg-white text-blue-600 shadow-sm transition-all">ระบุเอง</button>
                            <button type="button" onclick="setTimeBlock('allday')" id="tb-allday" class="time-block-btn py-1.5 text-xs font-bold rounded-lg text-gray-500 hover:bg-white/60 transition-all">เต็มวัน</button>
                            <button type="button" onclick="setTimeBlock('morning')" id="tb-morning" class="time-block-btn py-1.5 text-xs font-bold rounded-lg text-gray-500 hover:bg-white/60 transition-all">ครึ่งเช้า</button>
                            <button type="button" onclick="setTimeBlock('afternoon')" id="tb-afternoon" class="time-block-btn py-1.5 text-xs font-bold rounded-lg text-gray-500 hover:bg-white/60 transition-all">ครึ่งบ่าย</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">เวลาเริ่มต้น <span class="text-red-500">*</span></label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-blue-400 z-10">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </div>
                                <input type="text" id="eventTimeStart" required placeholder="--:--" class="modern-input w-full pl-12 pr-4 py-3 rounded-2xl text-sm font-bold text-gray-800 outline-none shadow-sm cursor-pointer bg-white">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">เวลาสิ้นสุด <span class="text-red-500">*</span></label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-blue-400 z-10">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </div>
                                <input type="text" id="eventTimeEnd" required placeholder="--:--" class="modern-input w-full pl-12 pr-4 py-3 rounded-2xl text-sm font-bold text-gray-800 outline-none shadow-sm cursor-pointer bg-white">
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">สถานที่ <span class="text-red-500">*</span></label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-blue-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                </div>
                                <input type="text" id="eventRoom" required placeholder="ระบุสถานที่" class="modern-input w-full pl-10 pr-4 py-3 rounded-2xl text-sm font-bold text-gray-800 outline-none shadow-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">ระดับความสำคัญ <span class="text-red-500">*</span></label>
                            <div class="relative group">
                                <select id="eventPriority" required class="modern-input w-full pl-4 pr-10 py-3 rounded-2xl text-sm font-bold outline-none appearance-none cursor-pointer shadow-sm">
                                    <option value="ทั่วไป">🟢 ทั่วไป</option>
                                    <option value="สำคัญ">🟠 สำคัญ</option>
                                    <option value="ด่วนที่สุด">🔴 ด่วนที่สุด</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-400">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="px-8 py-5 mt-4 bg-gray-50/50 border-t border-gray-100 flex justify-end gap-3 rounded-b-[32px]">
                    <button type="button" onclick="closeModal()" class="px-6 py-3 rounded-2xl font-bold text-gray-500 bg-white border border-gray-200 hover:bg-gray-50 transition-colors text-sm shadow-sm">ยกเลิก</button>
                    <button type="submit" id="submitBtn" class="px-8 py-3 rounded-2xl font-bold text-white btn-3d text-sm flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        ยืนยันการบันทึก
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = "2010128406-pWJYT2lK"; 
        const FIREBASE_URL = "https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/";
        
        let selectedExecData = null; 
        let allEventsData = []; 
        let fpDate, fpTimeStart, fpTimeEnd;
        let currentDisplayDate = new Date(); // ตัวแปรเก็บเดือนที่กำลังดูอยู่บนปฏิทิน

        const thaiMonthsFull = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        const thaiHolidays = {
            "2026-01-01": "ขึ้นปีใหม่",
            "2026-03-02": "มาฆบูชา",
            "2026-04-06": "วันจักรี",
            "2026-04-13": "สงกรานต์",
            "2026-04-14": "สงกรานต์",
            "2026-04-15": "สงกรานต์",
            "2026-05-01": "วันแรงงาน",
            "2026-05-04": "ฉัตรมงคล",
            "2026-06-01": "วิสาขบูชา",
            "2026-07-28": "เฉลิมพระชนมพรรษา",
            "2026-07-29": "อาสาฬหบูชา",
            "2026-08-12": "วันแม่",
            "2026-10-13": "วันสวรรคต ร.9",
            "2026-10-23": "ปิยมหาราช",
            "2026-12-05": "วันพ่อ",
            "2026-12-10": "รัฐธรรมนูญ",
            "2026-12-31": "สิ้นปี"
        };

        async function initializeLiff() {
            try {
                initFlatpickr();
                await liff.init({ liffId: MY_LIFF_ID });
                document.getElementById("loading").classList.add("hidden");

                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById("profileBox").classList.remove("hidden");
                    document.getElementById("profileBox").classList.add("flex");
                    document.getElementById("dashboardArea").classList.remove("hidden");
                    
                    document.getElementById("pictureUrl").src = profile.pictureUrl;
                    document.getElementById("displayName").innerText = profile.displayName;

                    await fetchExecutives();
                    await fetchEvents(); 
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF Init Error", err);
                document.getElementById("loading").innerText = "เกิดข้อผิดพลาด: " + err.message;
            }
        }

        function initFlatpickr() {
            fpDate = flatpickr("#eventDate", {
                locale: "th", altInput: true, altFormat: "d/m/Y", dateFormat: "Y-m-d", disableMobile: "true"
            });
            fpTimeStart = flatpickr("#eventTimeStart", {
                enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true, disableMobile: "true"
            });
            fpTimeEnd = flatpickr("#eventTimeEnd", {
                enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true, disableMobile: "true"
            });
        }

        function toggleDateMode(isMultiDay) {
            document.getElementById('eventDate').value = '';
            if(isMultiDay) {
                document.getElementById('dateLabel').innerHTML = 'ระบุช่วงวันที่ปฏิบัติงาน (คลิกวันเริ่มต้น และวันสุดท้าย) <span class="text-red-500">*</span>';
                fpDate = flatpickr("#eventDate", {
                    locale: "th", altInput: true, altFormat: "d/m/Y", dateFormat: "Y-m-d", mode: "range", disableMobile: "true"
                });
            } else {
                document.getElementById('dateLabel').innerHTML = 'ระบุวันที่ปฏิบัติงาน <span class="text-red-500">*</span>';
                fpDate = flatpickr("#eventDate", {
                    locale: "th", altInput: true, altFormat: "d/m/Y", dateFormat: "Y-m-d", mode: "single", disableMobile: "true"
                });
            }
        }

        function setTimeBlock(type) {
            document.querySelectorAll('.time-block-btn').forEach(b => {
                b.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
                b.classList.add('text-gray-500', 'hover:bg-white/60');
            });
            document.getElementById('tb-' + type).classList.add('bg-white', 'text-blue-600', 'shadow-sm');

            if(type === 'custom') {
                fpTimeStart.clear(); fpTimeEnd.clear();
            } else if (type === 'allday') {
                fpTimeStart.setDate('08:30'); fpTimeEnd.setDate('16:30');
            } else if (type === 'morning') {
                fpTimeStart.setDate('08:30'); fpTimeEnd.setDate('12:00');
            } else if (type === 'afternoon') {
                fpTimeStart.setDate('13:00'); fpTimeEnd.setDate('16:30');
            }
        }

        async function fetchExecutives() {
            try {
                let response = await fetch(FIREBASE_URL + "sadaoExecCalendar/executives.json");
                let data = await response.json();
                let selectMain = document.getElementById("execSelect");
                let dropdownMenu = document.getElementById("dropdownMenu");

                if(data) {
                    dropdownMenu.innerHTML = ''; 
                    for (let uid in data) {
                        let exec = data[uid];
                        let opt1 = document.createElement("option");
                        opt1.value = uid; opt1.innerText = exec.position + " ➔ " + exec.fullName;
                        selectMain.appendChild(opt1);

                        let avatarUrl = exec.picUrl ? exec.picUrl : `https://ui-avatars.com/api/?name=${encodeURIComponent(exec.fullName)}&background=eff6ff&color=3b82f6&rounded=true&bold=true`;
                        let item = document.createElement("div");
                        item.className = "flex items-center gap-3 p-3 hover:bg-blue-50 cursor-pointer transition-colors border-b border-gray-50 last:border-0";
                        item.innerHTML = `
                            <img src="${avatarUrl}" class="w-9 h-9 rounded-full shadow-sm border border-white object-cover">
                            <div class="flex flex-col">
                                <span class="text-sm font-bold text-gray-800">${exec.fullName}</span>
                                <span class="text-[10px] font-bold text-blue-500">${exec.position}</span>
                            </div>
                        `;
                        item.onclick = () => selectExecutive(uid, exec.fullName, exec.position, avatarUrl);
                        dropdownMenu.appendChild(item);
                    }
                }
            } catch (error) { console.error("Error:", error); }
        }

        async function fetchEvents() {
            try {
                let response = await fetch(FIREBASE_URL + "sadaoExecCalendar/events.json");
                let data = await response.json();
                allEventsData = [];
                if(data) {
                    for(let key in data) { allEventsData.push({ ...data[key], id: key }); }
                }
                triggerRenderCalendar();
            } catch (error) { console.error("Error fetching events:", error); }
        }

        function getDatesInRange(startDate, endDate) {
            const date = new Date(startDate);
            const dates = [];
            while (date <= new Date(endDate)) {
                // จัดการเรื่อง Timezone อัตโนมัติ เพื่อไม่ให้วันที่เพี้ยน
                let isoDate = new Date(date.getTime() - (date.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                dates.push(isoDate);
                date.setDate(date.getDate() + 1);
            }
            return dates;
        }

        function changeMonth(offset) {
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + offset);
            triggerRenderCalendar();
        }

        function triggerRenderCalendar() {
            let selectedUid = document.getElementById("execSelect").value;
            let eventsToRender = allEventsData;
            if(selectedUid !== "ALL" && selectedUid) {
                eventsToRender = allEventsData.filter(ev => ev.uid === selectedUid);
            }
            renderMonthlyCalendar(eventsToRender);
        }

        // ==========================================
        // 🗓️ สมองกลวาดปฏิทินรายเดือนอัจฉริยะ
        // ==========================================
        function renderMonthlyCalendar(eventsArray) {
            const container = document.getElementById("monthlyCalendarContainer");
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();

            const firstDay = new Date(year, month, 1).getDay(); // 0(Sun) - 6(Sat)
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // จัดกลุ่มงานตามวันที่
            const grouped = {};
            eventsArray.forEach(ev => {
                if(ev.isMultiDay && ev.startDate && ev.endDate) {
                    const rangeDates = getDatesInRange(ev.startDate, ev.endDate);
                    rangeDates.forEach(d => {
                        if(!grouped[d]) grouped[d] = [];
                        grouped[d].push(ev);
                    });
                } else {
                    if(!grouped[ev.date]) grouped[ev.date] = [];
                    grouped[ev.date].push(ev);
                }
            });

            // ส่วนหัวปฏิทิน (ปุ่มเลื่อนเดือน)
            let html = `
                <div class="flex justify-between items-center mb-6 px-2">
                    <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center rounded-full bg-white border border-gray-200 text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition-colors shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <h2 class="text-xl md:text-2xl font-black text-blue-900 tracking-tight">${thaiMonthsFull[month]} ${year + 543}</h2>
                    <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center rounded-full bg-white border border-gray-200 text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition-colors shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
                
                <div class="grid grid-cols-7 gap-1 md:gap-2 text-center mb-2">
                    <div class="text-[10px] md:text-xs font-black text-red-500 uppercase tracking-wider">อา.</div>
                    <div class="text-[10px] md:text-xs font-black text-slate-500 uppercase tracking-wider">จ.</div>
                    <div class="text-[10px] md:text-xs font-black text-slate-500 uppercase tracking-wider">อ.</div>
                    <div class="text-[10px] md:text-xs font-black text-slate-500 uppercase tracking-wider">พ.</div>
                    <div class="text-[10px] md:text-xs font-black text-slate-500 uppercase tracking-wider">พฤ.</div>
                    <div class="text-[10px] md:text-xs font-black text-slate-500 uppercase tracking-wider">ศ.</div>
                    <div class="text-[10px] md:text-xs font-black text-purple-500 uppercase tracking-wider">ส.</div>
                </div>
                <div class="grid grid-cols-7 gap-1 md:gap-2">
            `;

            // เติมช่องว่างก่อนวันที่ 1
            for(let i = 0; i < firstDay; i++) {
                html += `<div class="rounded-xl bg-gray-50/50 border border-transparent"></div>`;
            }

            // วนลูปสร้างช่องวันที่ 1 ถึง สิ้นเดือน
            let todayStr = new Date(new Date().getTime() - (new Date().getTimezoneOffset() * 60000)).toISOString().split('T')[0];

            for(let day = 1; day <= daysInMonth; day++) {
                let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                let dayEvents = grouped[dateStr] || [];
                let isToday = dateStr === todayStr;
                let isHoliday = thaiHolidays[dateStr] ? true : false;
                
                let currentDayOfWeek = new Date(year, month, day).getDay();
                let isWeekend = currentDayOfWeek === 0 || currentDayOfWeek === 6;

                // กำหนดคลาสช่องปฏิทิน
                let cellClass = "calendar-cell p-1.5 md:p-2 rounded-xl border bg-white flex flex-col gap-1 overflow-hidden ";
                
                if (isToday) {
                    cellClass += " border-blue-400 ring-2 ring-blue-100 bg-blue-50/20";
                } else if (isHoliday || isWeekend) {
                    cellClass += " border-red-100 bg-red-50/10";
                } else {
                    cellClass += " border-gray-200";
                }

                // สร้างป้ายสีของงานในแต่ละวัน
                dayEvents.sort((a,b) => (a.timeStart || "").localeCompare(b.timeStart || ""));
                
                let eventsHtml = dayEvents.map(ev => {
                    let color = "bg-blue-100 text-blue-700 border-blue-200"; // ทั่วไป
                    if(ev.priority === 'สำคัญ') color = "bg-orange-100 text-orange-700 border-orange-200";
                    if(ev.priority === 'ด่วนที่สุด') color = "bg-red-100 text-red-700 border-red-200";

                    return `
                        <div class="text-[9px] md:text-[11px] leading-tight p-1 px-1.5 rounded-md border ${color} truncate cursor-pointer shadow-sm" title="[${ev.timeStart}-${ev.timeEnd} น.] ${ev.title} (${ev.execName}) @${ev.room}">
                            <span class="font-black">${ev.timeStart}</span> ${ev.title}
                        </div>
                    `;
                }).join('');

                // สร้างตัวเลขวันที่
                let dateColor = isToday ? "text-white bg-blue-500 rounded-full w-6 h-6 flex items-center justify-center ml-auto shadow-sm" : 
                               (isHoliday || isWeekend ? "text-red-500" : "text-slate-600");
                
                let holidayText = isHoliday ? `<span class="text-[8px] text-red-400 font-bold block text-right leading-none mb-1 truncate">${thaiHolidays[dateStr]}</span>` : "";

                html += `
                    <div class="${cellClass}">
                        <div class="text-right text-xs md:text-sm font-black mb-1 ${dateColor} ${!isToday ? 'text-right block' : ''}">${day}</div>
                        ${holidayText}
                        <div class="flex-1 flex flex-col gap-1 overflow-y-auto hide-scroll">
                            ${eventsHtml}
                        </div>
                    </div>
                `;
            }

            html += `</div>`; 
            container.innerHTML = html;
        }

        // ==========================================
        // ส่วนจัดการ UI ย่อย
        // ==========================================
        document.getElementById('execSelect').addEventListener('change', triggerRenderCalendar);

        document.getElementById('dropdownTrigger').addEventListener('click', function() {
            document.getElementById('dropdownMenu').classList.toggle('hidden');
            this.classList.toggle('border-blue-400');
        });

        function selectExecutive(uid, fullName, position, avatarUrl) {
            selectedExecData = { uid, fullName, position, avatarUrl };
            document.getElementById('dropdownSelectedText').innerHTML = `
                <div class="flex items-center gap-2 -ml-1">
                    <img src="${avatarUrl}" class="w-6 h-6 rounded-full object-cover"><span class="text-gray-800 font-bold">${fullName}</span>
                </div>
            `;
            document.getElementById('dropdownMenu').classList.add('hidden');
        }

        function openModal() {
            document.getElementById('eventModal').classList.remove('hidden');
            document.getElementById('multiDayToggle').checked = false;
            toggleDateMode(false);
            setTimeBlock('custom');
            
            if(fpDate) fpDate.setDate(new Date()); // เริ่มต้นที่วันนี้
            if(fpTimeStart) fpTimeStart.clear();
            if(fpTimeEnd) fpTimeEnd.clear();
        }
        
        function closeModal() {
            document.getElementById('eventModal').classList.add('hidden');
            document.getElementById('eventForm').reset(); 
            selectedExecData = null;
            document.getElementById('dropdownSelectedText').innerHTML = '-- เลือกผู้บริหาร --';
        }

        // เซฟงานเข้า Firebase
        async function saveEvent(e) {
            e.preventDefault(); 
            if(!selectedExecData) {
                Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณาเลือกผู้บริหารก่อนครับ' }); return;
            }

            const timeStartVal = document.getElementById('eventTimeStart').value;
            const timeEndVal = document.getElementById('eventTimeEnd').value;
            if(!timeStartVal || !timeEndVal) {
                Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณาระบุเวลาเริ่มต้นและสิ้นสุดให้ครบถ้วนครับ' }); return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '⏳ กำลังบันทึก...';
            submitBtn.disabled = true;

            const dateValue = document.getElementById('eventDate').value;
            let finalEvent = {
                uid: selectedExecData.uid, execName: selectedExecData.fullName, execPosition: selectedExecData.position, avatar: selectedExecData.avatarUrl,
                title: document.getElementById('eventTitle').value,
                timeStart: timeStartVal,
                timeEnd: timeEndVal,
                room: document.getElementById('eventRoom').value,
                priority: document.getElementById('eventPriority').value,
                isMultiDay: document.getElementById('multiDayToggle').checked,
                timestamp: new Date().toISOString()
            };

            // ประมวลผล Range วันที่
            if(finalEvent.isMultiDay && dateValue.includes("ถึง")) {
                const dateParts = dateValue.split(" ถึง ");
                finalEvent.startDate = dateParts[0];
                finalEvent.endDate = dateParts[1] || dateParts[0];
                finalEvent.date = dateParts[0];
            } else if(finalEvent.isMultiDay && !dateValue.includes("ถึง")) {
                finalEvent.startDate = dateValue; finalEvent.endDate = dateValue; finalEvent.date = dateValue;
            } else {
                finalEvent.date = dateValue;
            }

            try {
                const response = await fetch(FIREBASE_URL + "sadaoExecCalendar/events.json", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(finalEvent)
                });
                if (response.ok) {
                    closeModal();
                    Swal.fire({ title: 'บันทึกสำเร็จ!', text: 'เพิ่มตารางงานลงปฏิทินเรียบร้อย', icon: 'success', confirmButtonColor: '#3b82f6' });
                    fetchEvents();
                }
            } catch (error) { Swal.fire('ข้อผิดพลาด', error.message, 'error'); } 
            finally { 
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false; 
            }
        }

        window.onload = initializeLiff;
    </script>

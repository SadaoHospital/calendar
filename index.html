<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=3.0">
    <title>ระบบปฏิทินผู้บริหาร รพ.สะเดา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>
    
    <style>
        body {
            background: radial-gradient(circle at top left, #ffffff 60%, #f0f9ff 90%, #e0f2fe 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass-master {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.08);
        }
        .event-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid #f3f4f6;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .event-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }
        .btn-3d {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .btn-3d:active { transform: scale(0.96); }
        .hide-scroll::-webkit-scrollbar { width: 4px; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .modal-enter { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .modern-input {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .modern-input:focus, .modern-input.active {
            background: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            display: none; -webkit-appearance: none;
        }
    </style>
</head>
<body class="p-3 md:p-6 text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto glass-master rounded-[32px] p-4 md:p-8 mt-2 relative">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 pb-6 border-b border-blue-100/50">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-sm overflow-hidden border border-gray-100 p-1">
                    <img src="https://github.com/SadaoHospital/calendar/blob/Img/%E0%B9%82%E0%B8%A3%E0%B8%87%E0%B8%9E%E0%B8%A2%E0%B8%B2%E0%B8%9A%E0%B8%B2%E0%B8%A5%20%E0%B8%AA%E0%B8%B0%E0%B9%80%E0%B8%94%E0%B8%B2%20-%20Copy.png?raw=true" alt="Sadao Hospital Logo" class="w-full h-full object-contain">
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-black tracking-tight text-gray-800">ระบบปฏิทินผู้บริหาร</h1>
                    <p class="text-xs md:text-sm font-bold text-blue-500 tracking-widest uppercase mt-0.5">Sadao Hospital Dashboard</p>
                </div>
            </div>
            <div id="profileBox" class="hidden items-center gap-3 bg-white p-2 pr-5 rounded-full border border-gray-100 shadow-sm">
                <img id="pictureUrl" src="" alt="User Profile" class="w-10 h-10 rounded-full border-2 border-blue-100 shadow-sm object-cover">
                <span id="displayName" class="text-sm font-bold text-gray-700">กำลังโหลด...</span>
            </div>
        </div>

        <div id="loading" class="text-center py-12 animate-pulse text-blue-500 font-bold tracking-wide">
            🌀 กำลังเชื่อมต่อฐานข้อมูลอัจฉริยะ...
        </div>

        <div id="dashboardArea" class="hidden">
            <div class="flex flex-col md:flex-row gap-4 mb-8">
                <div class="flex-1 bg-white/80 p-3 rounded-2xl border border-gray-100 shadow-sm flex items-center justify-between">
                    <button onclick="changeMonth(-1)" class="w-12 h-12 flex items-center justify-center rounded-xl bg-white border border-gray-200 text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition-colors shadow-sm">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    
                    <div class="flex items-center gap-3">
                        <h2 id="monthTitle" class="text-xl md:text-2xl font-black text-blue-900 tracking-tight">กำลังโหลดเดือน...</h2>
                        <button onclick="goToToday()" class="px-3 py-1.5 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded-lg text-xs font-bold transition-colors shadow-sm">
                            กลับไปวันนี้
                        </button>
                    </div>

                    <button onclick="changeMonth(1)" class="w-12 h-12 flex items-center justify-center rounded-xl bg-white border border-gray-200 text-gray-600 hover:bg-blue-50 hover:text-blue-600 transition-colors shadow-sm">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>

                <div class="bg-white/80 p-3 rounded-2xl border border-gray-100 shadow-sm md:w-1/3">
                    <select id="execSelect" class="w-full h-full px-4 rounded-xl bg-gray-50 border border-gray-200 text-sm font-bold text-gray-700 focus:outline-none focus:border-blue-400 focus:bg-white cursor-pointer appearance-none">
                        <option value="ALL">-- แสดงตารางของทุกคน --</option>
                    </select>
                </div>
                
                <div class="flex items-center">
                    <button onclick="openModal()" class="h-full px-6 rounded-2xl btn-3d text-white text-sm font-bold tracking-wide flex items-center justify-center gap-2 shadow-lg shadow-blue-500/30">
                        ➕ เพิ่มนัดหมาย
                    </button>
                </div>
            </div>

            <div id="calendarGridBox" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </div>
    </div>

    <div id="eventModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 hidden flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white/95 backdrop-blur-xl rounded-[32px] shadow-2xl border border-white w-full max-w-xl overflow-visible modal-enter relative my-auto">
            
            <form id="eventForm" onsubmit="saveEvent(event)" class="relative z-10 flex flex-col h-full">
                <div class="px-8 pt-6 pb-2 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 shadow-inner">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        </div>
                        <div>
                            <h3 class="text-xl font-black text-gray-800 tracking-tight">เพิ่มตารางงานใหม่</h3>
                            <p class="text-xs font-semibold text-blue-500">Smart Appointment & Recurring</p>
                        </div>
                    </div>
                    <button type="button" onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-red-100 hover:text-red-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <div class="px-8 py-2 space-y-4">
                    <div class="relative" id="dropdownContainer">
                        <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">ผู้บริหารที่รับผิดชอบ <span class="text-red-500">*</span></label>
                        <button type="button" id="dropdownTrigger" class="modern-input w-full pl-12 pr-4 py-3 rounded-2xl text-sm font-bold text-gray-700 text-left flex items-center justify-between shadow-sm">
                            <span id="dropdownSelectedText" class="text-gray-400 font-medium">-- เลือกผู้บริหาร --</span>
                        </button>
                        <div class="absolute inset-y-0 left-0 top-[24px] flex items-center pl-4 pointer-events-none text-blue-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <div id="dropdownMenu" class="hidden absolute z-50 w-full mt-1 bg-white border border-gray-100 rounded-2xl shadow-xl max-h-48 overflow-y-auto hide-scroll"></div>
                    </div>

                    <div>
                        <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">หัวข้อภารกิจ/กิจกรรม <span class="text-red-500">*</span></label>
                        <input type="text" id="eventTitle" required placeholder="ระบุชื่องาน (เช่น ประชุมบอร์ดบริหาร)" class="modern-input w-full px-4 py-3 rounded-2xl text-sm font-bold text-gray-800 outline-none shadow-sm">
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <div class="col-span-1">
                            <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">วันที่เริ่ม <span class="text-red-500">*</span></label>
                            <input type="text" id="eventDate" required placeholder="เลือกวัน" class="modern-input w-full px-4 py-3 rounded-2xl text-sm font-bold text-gray-800 outline-none shadow-sm cursor-pointer bg-white">
                        </div>
                        <div class="col-span-1">
                            <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">เวลาเริ่ม <span class="text-red-500">*</span></label>
                            <input type="text" id="eventTimeStart" required placeholder="--:--" class="modern-input w-full px-4 py-3 rounded-2xl text-sm font-bold text-gray-800 outline-none shadow-sm cursor-pointer bg-white">
                        </div>
                        <div class="col-span-1">
                            <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">เวลาจบ <span class="text-red-500">*</span></label>
                            <input type="text" id="eventTimeEnd" required placeholder="--:--" class="modern-input w-full px-4 py-3 rounded-2xl text-sm font-bold text-gray-800 outline-none shadow-sm cursor-pointer bg-white">
                        </div>
                    </div>

                    <div class="bg-blue-50/50 border border-blue-100 p-3 rounded-2xl">
                        <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1 flex items-center gap-2">
                            🔁 รูปแบบการทำซ้ำ (ต่อเนื่อง 1 ปีข้างหน้า)
                        </label>
                        <select id="eventRecurrence" class="modern-input w-full px-4 py-2.5 rounded-xl text-sm font-bold outline-none cursor-pointer shadow-sm text-blue-700">
                            <option value="none">-- ไม่ทำซ้ำ (กิจกรรมครั้งเดียว) --</option>
                            <option value="monthly_date">ทำซ้ำ "ทุกวันที่นี้" ของทุกเดือน</option>
                            <option value="monthly_weekday">ทำซ้ำ "ทุกสัปดาห์นี้และวันนี้" ของทุกเดือน (เช่น จันทร์แรก)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">สถานที่ <span class="text-red-500">*</span></label>
                            <input type="text" id="eventRoom" required placeholder="ระบุสถานที่" class="modern-input w-full px-4 py-3 rounded-2xl text-sm font-bold text-gray-800 outline-none shadow-sm">
                        </div>
                        <div>
                            <label class="block text-[13px] font-bold text-slate-700 mb-1 pl-1">ระดับความสำคัญ <span class="text-red-500">*</span></label>
                            <select id="eventPriority" required class="modern-input w-full px-4 py-3 rounded-2xl text-sm font-bold outline-none appearance-none cursor-pointer shadow-sm">
                                <option value="ทั่วไป">🟢 ทั่วไป</option>
                                <option value="สำคัญ">🟠 สำคัญ</option>
                                <option value="ด่วนที่สุด">🔴 ด่วนที่สุด</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="px-8 py-5 mt-4 bg-gray-50/50 border-t border-gray-100 flex justify-end gap-3 rounded-b-[32px]">
                    <button type="button" onclick="closeModal()" class="px-6 py-3 rounded-2xl font-bold text-gray-500 bg-white border border-gray-200 hover:bg-gray-50 transition-colors text-sm shadow-sm">ยกเลิก</button>
                    <button type="submit" id="submitBtn" class="px-8 py-3 rounded-2xl font-bold text-white btn-3d text-sm flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        ยืนยันการบันทึก
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = "2010128406-pWJYT2lK"; 
        const FIREBASE_URL = "https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/";
        
        let selectedExecData = null; 
        let allEventsData = []; 
        let fpDate, fpTimeStart, fpTimeEnd;
        let currentDisplayDate = new Date(); // ตัวชี้เป้าว่ากำลังดูเดือนไหน

        const thaiMonthsFull = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        const thaiDays = ["วันอาทิตย์", "วันจันทร์", "วันอังคาร", "วันพุธ", "วันพฤหัสบดี", "วันศุกร์", "วันเสาร์"];
        
        // ข้อมูลวันหยุดราชการไทย (อัปเดต 2569)
        const thaiHolidays = {
            "2026-01-01": "วันขึ้นปีใหม่", "2026-03-02": "วันมาฆบูชา", "2026-04-06": "วันจักรี",
            "2026-04-13": "สงกรานต์", "2026-04-14": "สงกรานต์", "2026-04-15": "สงกรานต์",
            "2026-05-01": "วันแรงงานฯ", "2026-05-04": "วันฉัตรมงคล", "2026-06-01": "วันวิสาขบูชา",
            "2026-07-28": "วันเฉลิมฯ ร.10", "2026-07-29": "วันอาสาฬหบูชา", "2026-08-12": "วันแม่แห่งชาติ",
            "2026-10-13": "วันสวรรคต ร.9", "2026-10-23": "วันปิยมหาราช", "2026-12-05": "วันพ่อแห่งชาติ",
            "2026-12-10": "วันรัฐธรรมนูญ", "2026-12-31": "วันสิ้นปี"
        };

        const colorThemes = [
            { border: "border-t-red-400", text: "text-red-500", bg: "bg-red-50/50" },       
            { border: "border-t-yellow-400", text: "text-yellow-500", bg: "bg-yellow-50/50" }, 
            { border: "border-t-pink-400", text: "text-pink-500", bg: "bg-pink-50/50" },       
            { border: "border-t-green-500", text: "text-green-600", bg: "bg-green-50/50" },    
            { border: "border-t-orange-400", text: "text-orange-500", bg: "bg-orange-50/50" }, 
            { border: "border-t-blue-400", text: "text-blue-500", bg: "bg-blue-50/50" },       
            { border: "border-t-purple-400", text: "text-purple-500", bg: "bg-purple-50/50" }  
        ];

        async function initializeLiff() {
            try {
                initFlatpickr();
                await liff.init({ liffId: MY_LIFF_ID });
                document.getElementById("loading").classList.add("hidden");

                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById("profileBox").classList.remove("hidden");
                    document.getElementById("profileBox").classList.add("flex");
                    document.getElementById("dashboardArea").classList.remove("hidden");
                    
                    document.getElementById("pictureUrl").src = profile.pictureUrl;
                    document.getElementById("displayName").innerText = profile.displayName;

                    await fetchExecutives();
                    await fetchEvents(); 
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF Init Error", err);
                document.getElementById("loading").innerText = "เกิดข้อผิดพลาด: " + err.message;
            }
        }

        function initFlatpickr() {
            fpDate = flatpickr("#eventDate", { locale: "th", altInput: true, altFormat: "d/m/Y", dateFormat: "Y-m-d", disableMobile: "true" });
            fpTimeStart = flatpickr("#eventTimeStart", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true, disableMobile: "true" });
            fpTimeEnd = flatpickr("#eventTimeEnd", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true, disableMobile: "true" });
        }

        async function fetchExecutives() {
            let response = await fetch(FIREBASE_URL + "sadaoExecCalendar/executives.json");
            let data = await response.json();
            let selectMain = document.getElementById("execSelect");
            let dropdownMenu = document.getElementById("dropdownMenu");

            if(data) {
                dropdownMenu.innerHTML = ''; 
                for (let uid in data) {
                    let exec = data[uid];
                    let opt1 = document.createElement("option");
                    opt1.value = uid; opt1.innerText = exec.position + " ➔ " + exec.fullName;
                    selectMain.appendChild(opt1);

                    let avatarUrl = exec.picUrl ? exec.picUrl : `https://ui-avatars.com/api/?name=${encodeURIComponent(exec.fullName)}&background=eff6ff&color=3b82f6&rounded=true&bold=true`;
                    let item = document.createElement("div");
                    item.className = "flex items-center gap-3 p-3 hover:bg-blue-50 cursor-pointer transition-colors border-b border-gray-50 last:border-0";
                    item.innerHTML = `
                        <img src="${avatarUrl}" class="w-9 h-9 rounded-full shadow-sm border border-white object-cover">
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-gray-800">${exec.fullName}</span>
                            <span class="text-[10px] font-bold text-blue-500">${exec.position}</span>
                        </div>
                    `;
                    item.onclick = () => selectExecutive(uid, exec.fullName, exec.position, avatarUrl);
                    dropdownMenu.appendChild(item);
                }
            }
        }

        async function fetchEvents() {
            let response = await fetch(FIREBASE_URL + "sadaoExecCalendar/events.json");
            let data = await response.json();
            allEventsData = [];
            if(data) {
                for(let key in data) { allEventsData.push({ ...data[key], id: key }); }
            }
            triggerRenderMonthlyGrid();
        }

        function changeMonth(offset) {
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + offset);
            triggerRenderMonthlyGrid();
        }
        
        // 🟢 ฟังก์ชันวาร์ปกลับไปเดือนปัจจุบัน
        function goToToday() {
            currentDisplayDate = new Date();
            triggerRenderMonthlyGrid();
        }

        function triggerRenderMonthlyGrid() {
            let selectedUid = document.getElementById("execSelect").value;
            let eventsToRender = allEventsData;
            if(selectedUid !== "ALL" && selectedUid) {
                eventsToRender = allEventsData.filter(ev => ev.uid === selectedUid);
            }
            renderMonthlyGrid(eventsToRender);
        }

        function getLocalISOString(dateObj) {
            return new Date(dateObj.getTime() - (dateObj.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        }

        function renderMonthlyGrid(eventsArray) {
            const gridBox = document.getElementById("calendarGridBox");
            gridBox.innerHTML = "";

            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            document.getElementById("monthTitle").innerText = `${thaiMonthsFull[month]} ${year + 543}`;
            
            // ใช้เช็คว่าเป็นวันปัจจุบันเพื่อทำไฮไลท์
            let todayDate = new Date();

            for (let day = 1; day <= daysInMonth; day++) {
                let targetDate = new Date(year, month, day);
                let dateStr = getLocalISOString(targetDate);
                let dayOfWeek = targetDate.getDay(); 
                let theme = colorThemes[dayOfWeek];
                
                let monthYear = `${thaiMonthsFull[month]} ${year + 543}`;
                let dayName = thaiDays[dayOfWeek];

                // 🟢 เช็คว่าเป็นวันนี้หรือไม่
                let isToday = (targetDate.getDate() === todayDate.getDate() && 
                               targetDate.getMonth() === todayDate.getMonth() && 
                               targetDate.getFullYear() === todayDate.getFullYear());

                // ป้ายแจ้งเตือนต่างๆ
                let holidayBadge = "";
                let todayBadgeSpan = "";

                if (isToday) {
                    todayBadgeSpan = `<span class="text-[9px] font-black px-2 py-0.5 rounded-md bg-blue-500 text-white shadow-sm ml-1 animate-pulse">🎯 วันนี้</span>`;
                }

                if (thaiHolidays[dateStr]) {
                    holidayBadge = `<span class="text-[9px] font-black px-2 py-0.5 rounded-md bg-red-500 text-white shadow-sm ml-1">🎈 ${thaiHolidays[dateStr]}</span>`;
                } else if (dayOfWeek === 0 || dayOfWeek === 6) {
                    holidayBadge = `<span class="text-[9px] font-bold px-2 py-0.5 rounded-md bg-gray-400 text-white shadow-sm ml-1">💤 วันหยุด</span>`;
                }

                let dayEvents = eventsArray.filter(e => e.date === dateStr);
                dayEvents.sort((a,b) => (a.timeStart || "").localeCompare(b.timeStart || ""));

                // 🟢 สไตล์ไฮไลท์กรอบเรืองแสงสำหรับ "วันนี้"
                let todayHighlight = isToday ? "ring-2 ring-blue-500 shadow-xl relative z-10" : "";
                let headerBg = isToday ? "bg-blue-50/80" : theme.bg;
                let numColor = isToday ? "text-blue-600" : theme.text;

                let cardHTML = `
                    <div class="event-card border-t-[5px] ${theme.border} flex flex-col h-80 ${todayHighlight} transition-all duration-300">
                        <div class="px-4 py-3 ${headerBg} border-b border-gray-100 flex items-center justify-between sticky top-0 z-10 rounded-t-2xl">
                            <div class="flex items-baseline gap-2">
                                <span class="text-3xl font-black ${numColor} tracking-tighter">${day}</span>
                                <div class="flex flex-col">
                                    <span class="text-[11px] font-bold text-gray-700">${monthYear}</span>
                                    <span class="text-[10px] font-bold text-gray-400 flex items-center">${dayName} ${holidayBadge} ${todayBadgeSpan}</span>
                                </div>
                            </div>
                            <span class="text-[10px] font-bold ${dayEvents.length > 0 ? 'text-blue-600 bg-white border-blue-100' : 'text-gray-400 bg-gray-100 border-gray-200'} px-2 py-1 rounded-lg shadow-sm border">${dayEvents.length} ภารกิจ</span>
                        </div>
                        <div class="p-2 overflow-y-auto hide-scroll flex-1 space-y-2 bg-gray-50/30">
                `;

                if (dayEvents.length === 0) {
                    cardHTML += `
                        <div class="flex items-center justify-center h-full text-xs font-bold text-gray-300 opacity-60">
                            ไม่มีตารางนัดหมาย
                        </div>
                    `;
                } else {
                    dayEvents.forEach(ev => {
                        let pClass = "bg-gray-100 text-gray-600";
                        if(ev.priority === "สำคัญ") pClass = "bg-orange-100 text-orange-600";
                        if(ev.priority === "ด่วนที่สุด") pClass = "bg-red-100 text-red-600";
                        let avatar = ev.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(ev.execName)}&background=eff6ff&color=3b82f6&rounded=true&bold=true`;

                        cardHTML += `
                            <div class="flex items-start gap-2 p-2 bg-white hover:bg-blue-50 border border-gray-100 rounded-xl transition-all shadow-sm">
                                <div class="relative shrink-0 mt-0.5"><img src="${avatar}" class="w-8 h-8 rounded-full border border-gray-200 object-cover"></div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex flex-wrap justify-between items-start gap-1 mb-1">
                                        <h5 class="text-xs font-bold text-gray-800 leading-tight truncate pr-1">${ev.title}</h5>
                                        <span class="shrink-0 text-[8px] font-bold px-1.5 py-0.5 rounded ${pClass}">${ev.priority}</span>
                                    </div>
                                    <p class="text-[10px] font-semibold text-blue-600 mb-1 truncate">${ev.execName}</p>
                                    <div class="flex flex-col gap-0.5 text-[9px] font-medium text-gray-500">
                                        <span class="truncate">⏰ ${ev.timeStart}-${ev.timeEnd} น.</span>
                                        <span class="truncate">📍 ${ev.room}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                cardHTML += `</div></div>`;
                gridBox.innerHTML += cardHTML;
            }
        }

        document.getElementById('execSelect').addEventListener('change', triggerRenderMonthlyGrid);

        document.getElementById('dropdownTrigger').addEventListener('click', function() {
            document.getElementById('dropdownMenu').classList.toggle('hidden');
            this.classList.toggle('border-blue-400');
        });

        function selectExecutive(uid, fullName, position, avatarUrl) {
            selectedExecData = { uid, fullName, position, avatarUrl };
            document.getElementById('dropdownSelectedText').innerHTML = `
                <div class="flex items-center gap-2 -ml-1">
                    <img src="${avatarUrl}" class="w-6 h-6 rounded-full object-cover"><span class="text-gray-800 font-bold">${fullName}</span>
                </div>
            `;
            document.getElementById('dropdownMenu').classList.add('hidden');
        }

        function openModal() {
            document.getElementById('eventModal').classList.remove('hidden');
            if(fpDate) fpDate.setDate(new Date()); 
            if(fpTimeStart) fpTimeStart.clear();
            if(fpTimeEnd) fpTimeEnd.clear();
        }
        
        function closeModal() {
            document.getElementById('eventModal').classList.add('hidden');
            document.getElementById('eventForm').reset(); 
            selectedExecData = null;
            document.getElementById('dropdownSelectedText').innerHTML = '-- เลือกผู้บริหาร --';
        }

        function generateRecurringEvents(baseEvent, recurType) {
            let events = [baseEvent];
            if (recurType === 'none') return events;

            let baseDate = new Date(baseEvent.date);
            let year = baseDate.getFullYear();
            let month = baseDate.getMonth();
            let date = baseDate.getDate();
            let dayOfWeek = baseDate.getDay();
            let nth = Math.ceil(date / 7); 

            for (let i = 1; i < 12; i++) {
                let nextMonth = month + i;
                let newEvent = { ...baseEvent };

                if (recurType === 'monthly_date') {
                    let targetDate = new Date(year, nextMonth, date);
                    if (targetDate.getMonth() !== (nextMonth % 12)) {
                        targetDate = new Date(year, nextMonth + 1, 0); 
                    }
                    newEvent.date = getLocalISOString(targetDate);
                    events.push(newEvent);

                } else if (recurType === 'monthly_weekday') {
                    let firstDayOfNextMonth = new Date(year, nextMonth, 1);
                    let firstDayOfWeek = firstDayOfNextMonth.getDay();
                    let diff = dayOfWeek - firstDayOfWeek;
                    if (diff < 0) diff += 7;
                    let targetDay = 1 + diff + ((nth - 1) * 7);

                    let daysInNextMonth = new Date(year, nextMonth + 1, 0).getDate();
                    if (targetDay <= daysInNextMonth) {
                        let targetDate = new Date(year, nextMonth, targetDay);
                        newEvent.date = getLocalISOString(targetDate);
                        events.push(newEvent);
                    }
                }
            }
            return events;
        }

        async function saveEvent(e) {
            e.preventDefault(); 
            if(!selectedExecData) {
                Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณาเลือกผู้บริหารก่อนครับ' }); return;
            }

            const timeStartVal = document.getElementById('eventTimeStart').value;
            const timeEndVal = document.getElementById('eventTimeEnd').value;
            if(!timeStartVal || !timeEndVal) {
                Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณาระบุเวลาให้ครบถ้วนครับ' }); return;
            }

            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '⏳ กำลังประมวลผล...';
            submitBtn.disabled = true;

            const baseEvent = {
                uid: selectedExecData.uid, execName: selectedExecData.fullName, execPosition: selectedExecData.position, avatar: selectedExecData.avatarUrl,
                title: document.getElementById('eventTitle').value,
                date: document.getElementById('eventDate').value,
                timeStart: timeStartVal,
                timeEnd: timeEndVal,
                room: document.getElementById('eventRoom').value,
                priority: document.getElementById('eventPriority').value,
                timestamp: new Date().toISOString()
            };

            const recurType = document.getElementById('eventRecurrence').value;
            const eventsToSave = generateRecurringEvents(baseEvent, recurType);

            try {
                Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
                
                const promises = eventsToSave.map(ev => 
                    fetch(FIREBASE_URL + "sadaoExecCalendar/events.json", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(ev)
                    })
                );
                
                await Promise.all(promises);

                closeModal();
                Swal.fire({ title: 'บันทึกสำเร็จ!', text: `เพิ่มตารางงานลงปฏิทินเรียบร้อย (${eventsToSave.length} รายการ)`, icon: 'success', confirmButtonColor: '#3b82f6' });
                
                currentDisplayDate = new Date(baseEvent.date);
                fetchEvents();

            } catch (error) { Swal.fire('ข้อผิดพลาด', error.message, 'error'); } 
            finally { 
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false; 
            }
        }

        window.onload = initializeLiff;
    </script>
</body>
</html>

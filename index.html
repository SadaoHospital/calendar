<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadao Hospital Executive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>
    
    <style>
        body { background: #f8fafc; font-family: 'Sarabun', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.8); }
        .btn-3d { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.2s; }
        .btn-3d:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4 bg-gray-50 text-slate-800">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8 glass p-6 rounded-3xl shadow-sm">
            <div>
                <h1 class="text-2xl font-black text-slate-900">ตารางงานผู้บริหาร</h1>
                <p class="text-sm font-bold text-blue-600">Sadao Hospital Executive Timeline</p>
            </div>
            <button onclick="openModal()" class="px-6 py-3 btn-3d text-white font-bold rounded-2xl shadow-lg">+ บันทึกงาน</button>
        </div>

        <select id="execSelect" class="w-full p-4 mb-6 rounded-2xl border border-gray-200 font-bold shadow-sm">
            <option value="ALL">-- แสดงงานทั้งหมดของทุกท่าน --</option>
        </select>

        <div id="timelineContainer" class="space-y-8"></div>
    </div>

    <div id="eventModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[32px] w-full max-w-lg p-8 shadow-2xl modal-enter">
            <h2 class="text-xl font-black mb-6">บันทึกภารกิจใหม่</h2>
            <form id="eventForm" onsubmit="saveEvent(event)" class="space-y-4">
                <select id="modalExecSelect" required class="w-full p-3 rounded-xl border border-gray-200 font-bold"></select>
                <input type="text" id="eventTitle" placeholder="ชื่อกิจกรรม" required class="w-full p-3 rounded-xl border border-gray-200">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="eventDate" placeholder="วันที่" required class="w-full p-3 rounded-xl border border-gray-200 bg-white">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="eventTimeStart" placeholder="เริ่ม" required class="w-full p-3 rounded-xl border border-gray-200 bg-white">
                        <input type="text" id="eventTimeEnd" placeholder="จบ" required class="w-full p-3 rounded-xl border border-gray-200 bg-white">
                    </div>
                </div>
                <input type="text" id="eventRoom" placeholder="สถานที่" required class="w-full p-3 rounded-xl border border-gray-200">
                <button type="submit" id="submitBtn" class="w-full py-3 btn-3d text-white font-bold rounded-xl">ยืนยัน</button>
            </form>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/";
        let allEventsData = [];

        async function initialize() {
            flatpickr("#eventDate", { locale: "th", altInput: true, altFormat: "d/m/Y", dateFormat: "Y-m-d" });
            flatpickr("#eventTimeStart", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true });
            flatpickr("#eventTimeEnd", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true });
            await fetchEvents();
        }

        async function fetchEvents() {
            let res = await fetch(FIREBASE_URL + "sadaoExecCalendar/events.json");
            let data = await res.json();
            allEventsData = data ? Object.values(data) : [];
            renderTimeline(allEventsData);
        }

        // 🟢 ระบบ Render แบบ Timeline เลื่อนดูได้ยาวๆ
        function renderTimeline(events) {
            const container = document.getElementById("timelineContainer");
            container.innerHTML = "";

            // เรียงลำดับงาน
            events.sort((a,b) => new Date(a.date).getTime() - new Date(b.date).getTime());
            
            // Group by Date
            const grouped = events.reduce((acc, ev) => {
                (acc[ev.date] = acc[ev.date] || []).push(ev);
                return acc;
            }, {});

            Object.keys(grouped).sort().forEach(date => {
                let dateObj = new Date(date);
                let dateHeader = dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
                
                let daySection = `
                    <div>
                        <h2 class="text-xl font-black text-blue-900 mb-3 sticky top-0 bg-gray-50/80 p-2 rounded-lg">${dateHeader}</h2>
                        <div class="space-y-3">
                            ${grouped[date].map(ev => `
                                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 hover:border-blue-300 transition-all">
                                    <img src="${ev.avatar || 'https://ui-avatars.com/api/?name='+ev.execName}" class="w-12 h-12 rounded-full object-cover">
                                    <div class="flex-1">
                                        <p class="font-bold text-sm">${ev.title || 'ไม่มีชื่อกิจกรรม'}</p>
                                        <p class="text-xs text-blue-600 font-bold">${ev.execName || ''}</p>
                                        <p class="text-[11px] text-gray-500 mt-1">⏰ ${ev.timeStart || '--'} - ${ev.timeEnd || '--'} น. | 📍 ${ev.room || '-'}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(document.createRange().createContextualFragment(daySection));
            });
        }

        // Filter
        document.getElementById('execSelect').addEventListener('change', function() {
            let uid = this.value;
            let filtered = uid === "ALL" ? allEventsData : allEventsData.filter(e => e.uid === uid);
            renderTimeline(filtered);
        });

        // Initialize (ดึงรายชื่อผู้บริหารและอื่นๆ เหมือนเดิม)
        window.onload = async () => {
            await initialize();
            // ... (ใส่ logic ดึงรายชื่อผู้บริหารมาใส่ใน execSelect และ modalExecSelect ที่นี่) ...
        };

        // Modal Function (saveEvent เดิม)
    </script>
</body>
</html>

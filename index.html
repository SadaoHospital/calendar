<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=3.0">
    <title>ระบบปฏิทินผู้บริหาร รพ.สะเดา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body {
            background: radial-gradient(circle at top left, #ffffff 60%, #f0f9ff 90%, #e0f2fe 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass-master {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.08);
        }
        .event-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid #f3f4f6;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }
        .event-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }
        .btn-3d {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .btn-3d:active { transform: scale(0.96); }
        .hide-scroll::-webkit-scrollbar { width: 4px; }
        .hide-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        
        /* แอนิเมชันสำหรับ Modal ล้ำยุค */
        .modal-enter { animation: modalFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        /* สไตล์ช่องกรอกข้อมูลพรีเมียม */
        .modern-input {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            transition: all 0.3s ease;
        }
        .modern-input:focus {
            background: #ffffff;
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
        }
        /* Custom Browser Date/Time Icon */
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover,
        input[type="time"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="p-3 md:p-6 text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto glass-master rounded-[32px] p-4 md:p-8 mt-2 relative">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 pb-6 border-b border-blue-100/50">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-sm overflow-hidden border border-gray-100 p-1">
                    <img src="https://github.com/SadaoHospital/calendar/blob/Img/%E0%B9%82%E0%B8%A3%E0%B8%87%E0%B8%9E%E0%B8%A2%E0%B8%B2%E0%B8%9A%E0%B8%B2%E0%B8%A5%20%E0%B8%AA%E0%B8%B0%E0%B9%80%E0%B8%94%E0%B8%B2%20-%20Copy.png?raw=true" alt="Sadao Hospital Logo" class="w-full h-full object-contain">
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-black tracking-tight text-gray-800">ระบบปฏิทินผู้บริหาร</h1>
                    <p class="text-xs md:text-sm font-bold text-blue-500 tracking-widest uppercase mt-0.5">Sadao Hospital Dashboard</p>
                </div>
            </div>
            <div id="profileBox" class="hidden items-center gap-3 bg-white p-2 pr-5 rounded-full border border-gray-100 shadow-sm">
                <img id="pictureUrl" src="" alt="User Profile" class="w-10 h-10 rounded-full border-2 border-blue-100 shadow-sm">
                <span id="displayName" class="text-sm font-bold text-gray-700">กำลังโหลด...</span>
            </div>
        </div>

        <div id="loading" class="text-center py-12 animate-pulse text-blue-500 font-bold tracking-wide">
            🌀 กำลังจัดเรียงตารางงาน...
        </div>

        <div id="dashboardArea" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <div class="bg-white/80 p-4 rounded-2xl border border-gray-100 shadow-sm">
                    <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5 pl-1">📌 ตัวกรองผู้บริหาร:</label>
                    <select id="execSelect" class="w-full p-3.5 rounded-xl bg-gray-50 border border-gray-200 text-sm font-bold text-gray-700 focus:outline-none focus:border-blue-400 focus:bg-white transition-colors cursor-pointer appearance-none">
                        <option value="">-- แสดงตารางงานของผู้บริหารทั้งหมด --</option>
                    </select>
                </div>
                <div class="flex items-center justify-end">
                    <button onclick="openModal()" class="w-full md:w-auto px-8 py-4 rounded-2xl btn-3d text-white text-sm font-bold tracking-wide flex items-center justify-center gap-2 shadow-lg shadow-blue-500/30">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                        บันทึกตารางงานใหม่
                    </button>
                </div>
            </div>

            <div id="calendarGridBox" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <div id="eventModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        
        <div class="bg-white/95 backdrop-blur-xl rounded-[32px] shadow-2xl border border-white w-full max-w-xl overflow-hidden modal-enter relative">
            
            <svg class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 text-blue-50 opacity-50 pointer-events-none" fill="currentColor" viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 002 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>

            <form id="eventForm" onsubmit="saveEvent(event)" class="relative z-10 flex flex-col h-full">
                
                <div class="px-8 pt-8 pb-4 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 shadow-inner">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <div>
                            <h3 class="text-xl font-black text-gray-800 tracking-tight">เพิ่มตารางงานใหม่</h3>
                            <p class="text-xs font-semibold text-blue-500">Add New Appointment</p>
                        </div>
                    </div>
                    <button type="button" onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-red-100 hover:text-red-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <div class="px-8 py-2 space-y-5">
                    
                    <div>
                        <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5 pl-1">ผู้บริหารที่รับผิดชอบ <span class="text-red-400">*</span></label>
                        <div class="relative relative group">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-blue-400 group-focus-within:text-blue-600 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            </div>
                            <select id="modalExecSelect" required class="modern-input w-full pl-12 pr-4 py-3.5 rounded-2xl text-sm font-bold text-gray-700 outline-none appearance-none cursor-pointer">
                                <option value="" disabled selected>-- เลือกผู้บริหาร --</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5 pl-1">หัวข้อภารกิจ/กิจกรรม <span class="text-red-400">*</span></label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-blue-400 group-focus-within:text-blue-600 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            </div>
                            <input type="text" id="eventTitle" required placeholder="ระบุชื่องาน (เช่น ประชุมบอร์ดบริหาร)" class="modern-input w-full pl-12 pr-4 py-3.5 rounded-2xl text-sm font-bold text-gray-700 outline-none placeholder-gray-300">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5 pl-1">วันที่ <span class="text-red-400">*</span></label>
                            <input type="date" id="eventDate" required class="modern-input w-full px-4 py-3.5 rounded-2xl text-sm font-bold text-gray-700 outline-none">
                        </div>
                        <div>
                            <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5 pl-1">เวลา (เริ่มต้น) <span class="text-red-400">*</span></label>
                            <input type="time" id="eventTime" required class="modern-input w-full px-4 py-3.5 rounded-2xl text-sm font-bold text-gray-700 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5 pl-1">สถานที่ <span class="text-red-400">*</span></label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-blue-400 group-focus-within:text-blue-600 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                </div>
                                <input type="text" id="eventRoom" required placeholder="ระบุสถานที่" class="modern-input w-full pl-10 pr-4 py-3.5 rounded-2xl text-sm font-bold text-gray-700 outline-none placeholder-gray-300">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[11px] font-black text-gray-400 uppercase tracking-wider mb-1.5 pl-1">ระดับความสำคัญ <span class="text-red-400">*</span></label>
                            <div class="relative group">
                                <select id="eventPriority" required class="modern-input w-full pl-4 pr-10 py-3.5 rounded-2xl text-sm font-bold outline-none appearance-none cursor-pointer">
                                    <option value="ทั่วไป" class="text-gray-600">🟢 ทั่วไป</option>
                                    <option value="สำคัญ" class="text-orange-500">🟠 สำคัญ</option>
                                    <option value="ด่วนที่สุด" class="text-red-500">🔴 ด่วนที่สุด</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-400">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="px-8 py-6 mt-2 bg-gray-50/50 border-t border-gray-100 flex justify-end gap-3 rounded-b-[32px]">
                    <button type="button" onclick="closeModal()" class="px-6 py-3.5 rounded-2xl font-bold text-gray-500 bg-white border border-gray-200 hover:bg-gray-50 hover:text-gray-700 transition-colors text-sm shadow-sm">
                        ยกเลิก
                    </button>
                    <button type="submit" id="submitBtn" class="px-8 py-3.5 rounded-2xl font-bold text-white btn-3d text-sm flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        ยืนยันการบันทึก
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = "2010128406-pWJYT2lK"; 
        const FIREBASE_URL = "https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/";

        async function initializeLiff() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                document.getElementById("loading").classList.add("hidden");

                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById("profileBox").classList.remove("hidden");
                    document.getElementById("profileBox").classList.add("flex");
                    document.getElementById("dashboardArea").classList.remove("hidden");
                    
                    document.getElementById("pictureUrl").src = profile.pictureUrl;
                    document.getElementById("displayName").innerText = profile.displayName;

                    fetchExecutives();
                    generateMockCalendarCards(); 
                } else {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF Init Error", err);
                document.getElementById("loading").innerText = "เกิดข้อผิดพลาด: " + err.message;
            }
        }

        async function fetchExecutives() {
            try {
                let response = await fetch(FIREBASE_URL + "sadaoExecCalendar/executives.json");
                let data = await response.json();
                
                let selectMain = document.getElementById("execSelect");
                let selectModal = document.getElementById("modalExecSelect");

                if(data) {
                    for (let uid in data) {
                        let exec = data[uid];
                        let optionText = exec.position + " ➔ " + exec.fullName;
                        
                        let opt1 = document.createElement("option");
                        opt1.value = uid; opt1.innerText = optionText;
                        selectMain.appendChild(opt1);

                        let opt2 = document.createElement("option");
                        opt2.value = uid; opt2.innerText = optionText;
                        opt2.dataset.fullname = exec.fullName;
                        opt2.dataset.position = exec.position;
                        selectModal.appendChild(opt2);
                    }
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        // เปิด-ปิด Modal แบบสมูท
        function openModal() {
            document.getElementById('eventModal').classList.remove('hidden');
            document.getElementById('eventDate').valueAsDate = new Date();
        }
        function closeModal() {
            document.getElementById('eventModal').classList.add('hidden');
            document.getElementById('eventForm').reset(); 
        }

        // ส่งข้อมูลเข้า Firebase พร้อมเอฟเฟกต์ปุ่ม
        async function saveEvent(e) {
            e.preventDefault(); 
            
            const submitBtn = document.getElementById('submitBtn');
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังบันทึก...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed');

            const selectModal = document.getElementById('modalExecSelect');
            const selectedOption = selectModal.options[selectModal.selectedIndex];
            
            const newEvent = {
                uid: selectModal.value,
                execName: selectedOption.dataset.fullname,
                execPosition: selectedOption.dataset.position,
                title: document.getElementById('eventTitle').value,
                date: document.getElementById('eventDate').value,
                time: document.getElementById('eventTime').value,
                room: document.getElementById('eventRoom').value,
                priority: document.getElementById('eventPriority').value,
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch(FIREBASE_URL + "sadaoExecCalendar/events.json", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newEvent)
                });

                if (response.ok) {
                    closeModal();
                    Swal.fire({
                        title: 'บันทึกสำเร็จ!',
                        text: 'เพิ่มตารางงานเข้าสู่ระบบเรียบร้อยแล้ว',
                        icon: 'success',
                        confirmButtonColor: '#3b82f6',
                        shape: 'rounded-2xl'
                    });
                } else {
                    throw new Error("บันทึกไม่สำเร็จ");
                }
            } catch (error) {
                Swal.fire('ข้อผิดพลาด', error.message, 'error');
            } finally {
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        // ฟังก์ชันวาดการ์ด (โครงเดิม)
        function generateMockCalendarCards() {
            const gridBox = document.getElementById("calendarGridBox");
            gridBox.innerHTML = "";
            const mockDays = [
                { 
                    dateNum: "18", monthYear: "พ.ค. 2569", dayName: "วันจันทร์", 
                    borderColor: "border-t-yellow-400", dateColor: "text-yellow-500", bgColor: "bg-yellow-50/50",
                    events: [
                        { time: "09:00", title: "ประชุมบอร์ดบริหาร รพ. ประจำเดือน", person: "นพ.ทดสอบ (ผอ.)", room: "ห้องประชุมไพทูรย์", priority: "ด่วนที่สุด", priorityClass: "bg-red-100 text-red-600", avatar: "https://i.pravatar.cc/150?u=a042581f4e29026704d" },
                    ]
                }
            ];
            mockDays.forEach(day => {
                let cardHTML = `<div class="event-card border-t-4 ${day.borderColor} flex flex-col max-h-[400px]">
                        <div class="px-5 py-4 ${day.bgColor} border-b border-gray-100 flex items-center justify-between sticky top-0 z-10">
                            <div class="flex items-baseline gap-2">
                                <span class="text-3xl font-black ${day.dateColor} tracking-tighter">${day.dateNum}</span>
                                <div class="flex flex-col"><span class="text-xs font-bold text-gray-700">${day.monthYear}</span><span class="text-[10px] font-bold text-gray-400">${day.dayName}</span></div>
                            </div>
                            <span class="text-xs font-bold text-gray-400 bg-white px-2 py-1 rounded-lg shadow-sm border border-gray-100">${day.events.length} ภารกิจ</span>
                        </div>
                        <div class="p-3 overflow-y-auto hide-scroll flex-1 space-y-2">`;
                day.events.forEach(ev => {
                    cardHTML += `<div class="flex items-start gap-3 p-3 bg-white hover:bg-gray-50 border border-gray-100 rounded-xl cursor-pointer group">
                            <div class="relative shrink-0 mt-0.5"><img src="${ev.avatar}" alt="Avatar" class="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover"></div>
                            <div class="flex-1 min-w-0">
                                <div class="flex flex-wrap justify-between items-start gap-1 mb-1"><h5 class="text-[13px] font-bold text-gray-800 leading-tight truncate pr-2">${ev.title}</h5><span class="shrink-0 text-[9px] font-bold px-1.5 py-0.5 rounded ${ev.priorityClass}">${ev.priority}</span></div>
                                <p class="text-[11px] font-semibold text-blue-600 mb-1.5 truncate">${ev.person}</p>
                                <div class="flex items-center gap-3 text-[10px] font-medium text-gray-500"><span class="flex items-center gap-1 bg-gray-100/80 px-1.5 py-0.5 rounded">⏰ ${ev.time}</span><span class="flex items-center gap-1 truncate">📍 ${ev.room}</span></div>
                            </div></div>`;
                });
                cardHTML += `</div></div>`;
                gridBox.innerHTML += cardHTML;
            });
        }
        window.onload = initializeLiff;
    </script>
</body>
</html>

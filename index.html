<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบปฏิทินผู้บริหาร รพ.สะเดา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/th.js"></script>
    
    <style>
        body { background: radial-gradient(circle at top left, #ffffff 60%, #f0f9ff 90%, #e0f2fe 100%); min-height: 100vh; }
        .glass-master { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 20px 50px rgba(59, 130, 246, 0.08); }
        .btn-3d { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: all 0.2s; }
        .btn-3d:active { transform: scale(0.96); }
        .calendar-cell { height: 120px; transition: all 0.2s; border: 1px solid #e5e7eb; background: #fff; }
        .calendar-cell:hover { background: #f0f9ff; }
        /* การ์ดงานในช่องปฏิทิน */
        .event-chip { font-size: 10px; padding: 2px 4px; border-radius: 4px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    </style>
</head>
<body class="p-4 text-gray-800 font-sans">
    <div class="max-w-7xl mx-auto glass-master rounded-[32px] p-8 mt-2">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black text-gray-800">ระบบปฏิทินผู้บริหาร</h1>
                <p class="text-sm font-bold text-blue-500 uppercase tracking-widest">Sadao Hospital Dashboard</p>
            </div>
            <button onclick="openModal()" class="px-6 py-3 btn-3d text-white font-bold rounded-2xl flex items-center gap-2">➕ เพิ่มตารางงาน</button>
        </div>

        <div id="loading" class="text-center py-12 animate-pulse text-blue-500 font-bold">🌀 กำลังเชื่อมต่อ...</div>

        <div id="dashboardArea" class="hidden">
            <select id="execSelect" class="w-full md:w-1/3 p-3 mb-6 rounded-xl border border-gray-200 font-bold text-gray-700">
                <option value="ALL">-- แสดงตารางงานของผู้บริหารทั้งหมด --</option>
            </select>

            <div id="calendarContainer" class="grid grid-cols-7 gap-2 bg-gray-100 p-2 rounded-2xl"></div>
        </div>
    </div>

    <div id="eventModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[32px] shadow-2xl w-full max-w-lg p-8 modal-enter">
            <h2 class="text-xl font-black mb-6">เพิ่มตารางงานใหม่</h2>
            <form id="eventForm" onsubmit="saveEvent(event)" class="space-y-4">
                <select id="modalExecSelect" required class="w-full p-3 rounded-xl border border-gray-200 font-bold"></select>
                <input type="text" id="eventTitle" placeholder="ชื่อกิจกรรม" required class="w-full p-3 rounded-xl border border-gray-200">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="eventDate" placeholder="วันที่ (วว/ดด/ปปปป)" required class="w-full p-3 rounded-xl border border-gray-200 bg-white">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="eventTimeStart" placeholder="เริ่ม (--:--)" required class="w-full p-3 rounded-xl border border-gray-200 bg-white">
                        <input type="text" id="eventTimeEnd" placeholder="จบ (--:--)" required class="w-full p-3 rounded-xl border border-gray-200 bg-white">
                    </div>
                </div>
                <input type="text" id="eventRoom" placeholder="สถานที่" required class="w-full p-3 rounded-xl border border-gray-200">
                <select id="eventPriority" class="w-full p-3 rounded-xl border border-gray-200 font-bold">
                    <option value="ทั่วไป">🟢 ทั่วไป</option>
                    <option value="สำคัญ">🟠 สำคัญ</option>
                    <option value="ด่วนที่สุด">🔴 ด่วนที่สุด</option>
                </select>
                <button type="submit" id="submitBtn" class="w-full py-3 btn-3d text-white font-bold rounded-xl">ยืนยัน</button>
            </form>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/";
        let allEventsData = [];
        let currentDisplayDate = new Date();

        async function initialize() {
            initFlatpickr();
            await fetchEvents();
            renderCalendar();
        }

        // 🟢 ล็อค Flatpickr ให้เป็น 24 ชม. และรูปแบบไทย
        function initFlatpickr() {
            flatpickr("#eventDate", { locale: "th", altInput: true, altFormat: "d/m/Y", dateFormat: "Y-m-d" });
            flatpickr("#eventTimeStart", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true, altInput: true, altFormat: "H:i" });
            flatpickr("#eventTimeEnd", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true, altInput: true, altFormat: "H:i" });
        }

        async function fetchEvents() {
            let res = await fetch(FIREBASE_URL + "sadaoExecCalendar/events.json");
            let data = await res.json();
            allEventsData = data ? Object.values(data) : [];
            document.getElementById("loading").classList.add("hidden");
            document.getElementById("dashboardArea").classList.remove("hidden");
        }

        function renderCalendar() {
            const container = document.getElementById("calendarContainer");
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();

            let html = `<div class="col-span-7 font-black text-center mb-2">พฤษภาคม 2569</div>`;
            ["อา","จ","อ","พ","พฤ","ศ","ส"].forEach(d => html += `<div class="font-bold text-center">${d}</div>`);
            
            for(let i=0; i<firstDay; i++) html += `<div></div>`;
            
            for(let day=1; day<=daysInMonth; day++) {
                let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                let events = allEventsData.filter(e => e.date === dateStr);
                
                // 🟢 สร้าง Event Chips ให้โชว์ชื่อสั้นๆ ในช่องวัน
                let chips = events.map(e => `
                    <div class="event-chip ${e.priority === 'ด่วนที่สุด' ? 'bg-red-200 text-red-800' : 'bg-blue-200 text-blue-800'}" title="${e.title}">
                        ${e.timeStart || ''} ${e.title}
                    </div>
                `).join('');

                html += `<div class="calendar-cell rounded-xl overflow-hidden p-1">
                            <span class="font-black text-sm">${day}</span>
                            <div class="flex flex-col gap-1 mt-1">${chips}</div>
                        </div>`;
            }
            container.innerHTML = html;
        }

        // Modal และ Save Function คงเดิม (แต่เพิ่มดัก error)
        function openModal() { document.getElementById('eventModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('eventModal').classList.add('hidden'); }
        
        // ฟังก์ชัน Save แก้บั๊ก undefined ด้วยการเช็กข้อมูลก่อนส่ง
        async function saveEvent(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            
            const newEvent = {
                execName: document.getElementById('modalExecSelect').options[document.getElementById('modalExecSelect').selectedIndex].text,
                title: document.getElementById('eventTitle').value || 'ไม่มีชื่อกิจกรรม',
                date: document.getElementById('eventDate').value,
                timeStart: document.getElementById('eventTimeStart').value || '00:00',
                timeEnd: document.getElementById('eventTimeEnd').value || '00:00',
                room: document.getElementById('eventRoom').value || '-',
                priority: document.getElementById('eventPriority').value
            };

            await fetch(FIREBASE_URL + "sadaoExecCalendar/events.json", { method: 'POST', body: JSON.stringify(newEvent) });
            closeModal();
            fetchEvents();
            submitBtn.disabled = false;
        }

        window.onload = initialize;
    </script>
</body>
</html>

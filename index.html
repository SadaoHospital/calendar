<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>ปฏิทินผู้บริหาร - รพ.สะเดา</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        @media (min-width: 1024px) { html { font-size: 85%; } }
        body { font-family: 'Prompt', sans-serif; background-color: #eef2f6; margin: 0; padding: 0; overflow-x: hidden; }

        .bg-shapes { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; background: linear-gradient(135deg, #eef2f6 0%, #f8fafc 100%); }
        .shape-1 { position: absolute; top: -10%; left: -5%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; }
        .shape-2 { position: absolute; bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(168,85,247,0.1) 0%, rgba(255,255,255,0) 70%); border-radius: 50%; }

        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), inset 0 1px 2px rgba(255, 255, 255, 0.9); }
        .card-3d { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03), 0 2px 4px -1px rgba(0, 0, 0, 0.02), inset 0 2px 4px rgba(255, 255, 255, 0.8); display: flex; flex-direction: column; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .card-3d:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04), inset 0 2px 5px rgba(255, 255, 255, 1); }
        
        .event-item { background: linear-gradient(145deg, #ffffff, #f9fafb); box-shadow: 2px 2px 6px rgba(0,0,0,0.04), -2px -2px 6px rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,1); transition: transform 0.2s; }
        .event-item:hover { transform: scale(1.02); box-shadow: 4px 4px 10px rgba(0,0,0,0.08), -2px -2px 6px rgba(255,255,255,0.9); border-color: #e0f2fe; }

        .border-top-0 { border-top: 4px solid #ef4444; } .border-top-1 { border-top: 4px solid #eab308; } .border-top-2 { border-top: 4px solid #ec4899; } .border-top-3 { border-top: 4px solid #22c55e; } .border-top-4 { border-top: 4px solid #f97316; } .border-top-5 { border-top: 4px solid #3b82f6; } .border-top-6 { border-top: 4px solid #a855f7; } 

        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        ::-webkit-scrollbar { width: 4px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Styles สำหรับ Modal */
        .modal-overlay { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { transform: scale(0.95) translateY(10px); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); opacity: 1; }
        
        /* สไตล์ Form */
        .input-field { w-full; bg-gray-50; border; border-gray-200; text-gray-800; text-sm; rounded-lg; px-3; py-2; outline-none; transition: all 0.2s; }
        .input-field:focus { bg-white; border-blue-400; ring-2; ring-blue-100; }
    </style>
</head>
<body>

    <div class="bg-shapes"><div class="shape-1"></div><div class="shape-2"></div></div>

    <div class="sticky top-0 z-40 pt-3 pb-2 bg-gradient-to-b from-[#eef2f6] via-[#eef2f6]/95 to-transparent px-2 md:px-4">
        <div class="max-w-[1600px] mx-auto">
            <header class="glass-nav rounded-2xl px-4 md:px-6 py-3 flex flex-col gap-3">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="flex items-center gap-3 md:gap-4 w-full md:w-auto justify-center md:justify-start">
                        <div class="w-12 h-12 md:w-14 md:h-14 rounded-full bg-white shadow-md flex items-center justify-center p-1.5 border border-gray-100 flex-shrink-0">
                            <img src="https://github.com/SadaoHospital/calendar/blob/Img/%E0%B9%82%E0%B8%A3%E0%B8%87%E0%B8%9E%E0%B8%A2%E0%B8%B2%E0%B8%9A%E0%B8%B2%E0%B8%A5%20%E0%B8%AA%E0%B8%B0%E0%B9%80%E0%B8%94%E0%B8%B2%20-%20Copy.png?raw=true" class="w-full h-full object-contain drop-shadow-sm">
                        </div>
                        <div class="text-center md:text-left">
                            <h1 class="text-xl md:text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-indigo-600 drop-shadow-sm">ปฏิทินผู้บริหาร</h1>
                            <p class="text-xs md:text-sm text-gray-500 font-medium tracking-wide">โรงพยาบาลสะเดา</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-2 bg-white/50 p-1.5 rounded-full shadow-inner border border-gray-200/60 w-full md:w-auto justify-between md:justify-center">
                        <button onclick="loadPreviousMonth()" class="w-8 h-8 rounded-full flex items-center justify-center bg-white shadow-sm hover:bg-blue-50 text-gray-600 transition"><i class="fa-solid fa-chevron-left"></i></button>
                        <span id="current-month-display" class="px-2 md:px-4 font-bold text-gray-700 min-w-[140px] md:min-w-[160px] text-center text-sm md:text-base">กำลังโหลด...</span>
                        <button onclick="resetToToday()" class="px-3 py-1 rounded-full bg-blue-100 hover:bg-blue-200 text-blue-700 text-xs font-bold transition">วันนี้</button>
                        <button onclick="loadNextMonth()" class="w-8 h-8 rounded-full flex items-center justify-center bg-white shadow-sm hover:bg-blue-50 text-gray-600 transition"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>

                    <div class="flex items-center gap-3 pl-0 md:pl-6 border-l-0 md:border-l border-gray-300/50 w-full md:w-auto justify-center md:justify-end">
                        <div class="text-right">
                            <p id="user-display-name" class="text-sm font-bold text-gray-800">กำลังตรวจสอบสิทธิ์...</p>
                            <p class="text-[10px] text-gray-600 font-bold bg-gray-100 px-2 py-0.5 rounded-full inline-flex items-center gap-1 mt-0.5 border border-gray-200" id="login-status-box">
                                <span id="login-status-dot" class="w-1.5 h-1.5 bg-gray-400 rounded-full"></span> 
                                <span id="login-status-text">รอการเชื่อมต่อ</span>
                            </p>
                        </div>
                        <div class="relative">
                            <img id="user-profile-img" src="https://ui-avatars.com/api/?name=User&background=e5e7eb&color=9ca3af" class="w-10 h-10 md:w-11 md:h-11 rounded-full border-2 border-white shadow-lg object-cover">
                            <div id="status-indicator" class="absolute bottom-0 right-0 w-3 h-3 bg-gray-400 border-2 border-white rounded-full"></div>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row justify-between items-center w-full gap-3 pt-3 border-t border-gray-200/50">
                    <div class="flex items-center gap-2 text-xs md:text-sm font-semibold text-blue-700">
                        <i class="fa-solid fa-filter"></i> ตัวกรองข้อมูลผู้บริหาร
                    </div>
                    <select id="filter-select" onchange="renderCalendar()" class="w-full sm:w-auto bg-white/90 border border-gray-300 text-gray-700 text-xs md:text-sm rounded-full px-4 py-1.5 shadow-sm outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer font-medium transition">
                        <option value="ALL">📋 แสดงทุกรายการ (ตามสิทธิ์)</option>
                        <option value="ROLE:ทีมนำ">⭐ เฉพาะทีมนำ</option>
                        <option value="ROLE:ผู้อำนวยการ">🎯 เฉพาะผู้อำนวยการ</option>
                    </select>
                </div>
            </header>
        </div>
    </div>

    <div class="w-full overflow-x-auto hide-scroll px-1 md:px-4 pb-12">
        <div class="min-w-[650px] max-w-[1600px] mx-auto relative z-10">
            <div class="sticky top-0 z-30 glass-nav rounded-xl px-1.5 md:px-4 py-2 grid grid-cols-7 gap-1.5 md:gap-4 text-center font-bold text-[10px] md:text-sm shadow-sm">
                <div class="text-red-500">อา.</div><div class="text-yellow-600">จ.</div><div class="text-pink-500">อ.</div>
                <div class="text-green-600">พ.</div><div class="text-orange-500">พฤ.</div><div class="text-blue-500">ศ.</div><div class="text-purple-500">ส.</div>
            </div>

            <div id="calendar-grid" class="grid grid-cols-7 gap-1.5 md:gap-4 pt-2 md:pt-4">
                <div class="col-span-7 text-center py-32 text-gray-400">
                    <i class="fa-solid fa-circle-notch fa-spin text-5xl text-blue-500"></i>
                    <p class="mt-4 font-medium text-lg">กำลังซิงค์ข้อมูล...</p>
                </div>
            </div>
        </div>
    </div>

    <button id="fab-add-event" onclick="openAddEventModal()" class="hidden fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-full shadow-lg hover:shadow-2xl hover:scale-105 transition-all z-50 flex items-center justify-center text-2xl border-2 border-white">
        <i class="fa-solid fa-plus"></i>
    </button>

    <div id="eventModal" class="fixed inset-0 z-[100] flex items-center justify-center modal-overlay p-4">
        <div class="modal-content glass-nav rounded-2xl w-full max-w-md overflow-hidden relative">
            <button onclick="closeModal('eventModal')" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition w-8 h-8 flex items-center justify-center rounded-full hover:bg-red-50"><i class="fa-solid fa-xmark text-xl"></i></button>
            <div id="modal-color-bar" class="h-2 w-full bg-blue-500"></div>
            <div class="p-6">
                <div class="flex items-center gap-3 mb-4 pb-4 border-b border-gray-100">
                    <img id="modal-avatar" src="" class="w-12 h-12 rounded-full border-2 border-white shadow-md object-cover">
                    <div>
                        <h3 id="modal-exec-name" class="font-bold text-gray-800 text-lg leading-tight">ชื่อผู้บริหาร</h3>
                        <p id="modal-exec-position" class="text-xs text-gray-500 font-medium">ตำแหน่ง</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <div>
                        <span id="modal-priority-badge" class="text-[10px] px-2 py-0.5 rounded border mb-2 inline-block font-bold"></span>
                        <h2 id="modal-title" class="text-xl font-extrabold text-gray-800 leading-snug">ชื่องาน</h2>
                    </div>
                    <div class="bg-gray-50/50 p-4 rounded-xl border border-gray-100 space-y-3">
                        <div class="flex items-start gap-3"><div class="w-6 text-center text-blue-500 mt-0.5"><i class="fa-solid fa-calendar-day"></i></div><div><p class="text-[10px] text-gray-400 font-semibold uppercase">วันที่</p><p id="modal-date" class="text-sm font-bold text-gray-700"></p></div></div>
                        <div class="flex items-start gap-3"><div class="w-6 text-center text-amber-500 mt-0.5"><i class="fa-solid fa-clock"></i></div><div><p class="text-[10px] text-gray-400 font-semibold uppercase">เวลา</p><p id="modal-time" class="text-sm font-bold text-gray-700"></p></div></div>
                        <div class="flex items-start gap-3"><div class="w-6 text-center text-green-500 mt-0.5"><i class="fa-solid fa-location-dot"></i></div><div><p class="text-[10px] text-gray-400 font-semibold uppercase">สถานที่</p><p id="modal-room" class="text-sm font-bold text-gray-700"></p></div></div>
                    </div>
                </div>
                <div id="modal-actions" class="mt-6 pt-4 border-t border-gray-100 flex justify-end gap-2 hidden">
                    <button onclick="deleteCurrentEvent()" class="px-4 py-2 bg-red-50 hover:bg-red-500 hover:text-white text-red-600 text-sm font-bold rounded-lg transition shadow-sm border border-red-200 flex items-center gap-2"><i class="fa-solid fa-trash-can"></i> ลบข้อมูล</button>
                </div>
            </div>
        </div>
    </div>

    <div id="addEventModal" class="fixed inset-0 z-[100] flex items-center justify-center modal-overlay p-4 overflow-y-auto">
        <div class="modal-content glass-nav rounded-2xl w-full max-w-lg overflow-hidden relative my-auto">
            <div class="h-2 w-full bg-gradient-to-r from-blue-500 to-indigo-500"></div>
            <div class="p-5 md:p-6">
                <div class="flex justify-between items-center mb-4 pb-3 border-b border-gray-200">
                    <h2 class="text-lg font-bold text-blue-700"><i class="fa-solid fa-calendar-plus mr-2"></i>เพิ่มนัดหมายใหม่</h2>
                    <button onclick="closeModal('addEventModal')" class="text-gray-400 hover:text-red-500 text-xl"><i class="fa-solid fa-xmark"></i></button>
                </div>
                
                <form id="addEventForm" onsubmit="submitAddEvent(event)" class="space-y-3">
                    
                    <div id="form-role-target" class="hidden bg-blue-50 p-3 rounded-lg border border-blue-200 mb-2">
                        <label class="block text-xs font-semibold text-blue-700 mb-1">ลงตารางงานให้ (สำหรับหัวหน้าบริหาร)</label>
                        <select id="input-target-user" class="w-full bg-white border border-blue-300 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-400">
                            </select>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">หัวข้อกิจกรรม / นัดหมาย <span class="text-red-500">*</span></label>
                        <input type="text" id="input-title" required class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100" placeholder="ระบุชื่องาน">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">ตั้งแต่วันที่ <span class="text-red-500">*</span></label>
                            <input type="date" id="input-date-start" required class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:bg-white focus:border-blue-400">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">ถึงวันที่ <span class="text-red-500">*</span></label>
                            <input type="date" id="input-date-end" required class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:bg-white focus:border-blue-400">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">เวลาเริ่ม (น.)</label>
                            <input type="time" id="input-time-start" value="08:30" class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:bg-white focus:border-blue-400">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">เวลาสิ้นสุด (น.)</label>
                            <input type="time" id="input-time-end" value="16:30" class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:bg-white focus:border-blue-400">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">สถานที่</label>
                        <input type="text" id="input-room" class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:bg-white focus:border-blue-400" placeholder="เช่น ห้องประชุม 1, โรงแรม...">
                    </div>

                    <div class="grid grid-cols-2 gap-3 pb-2">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">ความสำคัญ</label>
                            <select id="input-priority" class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:bg-white focus:border-blue-400">
                                <option value="ทั่วไป">ทั่วไป</option>
                                <option value="สำคัญ">สำคัญ</option>
                                <option value="ด่วนที่สุด">ด่วนที่สุด</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">สิทธิ์การมองเห็น</label>
                            <select id="input-visibility" class="w-full bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-lg px-3 py-2 outline-none focus:bg-white focus:border-blue-400">
                                <option value="public">🌐 สาธารณะ (ทุกคนเห็นได้)</option>
                                <option value="committee">👥 เฉพาะคณะกรรมการ</option>
                                <option value="private">🔒 ส่วนตัว (เห็นเฉพาะตนเอง)</option>
                            </select>
                        </div>
                    </div>

                    <div class="pt-3 border-t border-gray-200 flex justify-end gap-2">
                        <button type="button" onclick="closeModal('addEventModal')" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-bold rounded-lg transition">ยกเลิก</button>
                        <button type="submit" id="btn-submit-event" class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-lg transition shadow-md flex items-center gap-2">
                            <i class="fa-solid fa-save"></i> บันทึกข้อมูล
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/sadaoExecCalendar/events.json?auth=c0RJi6FNEQfcCur7GddJ12QbleXtzLneiVwNBaeP";
        const EXECS_URL = "https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/sadaoExecCalendar/executives.json?auth=c0RJi6FNEQfcCur7GddJ12QbleXtzLneiVwNBaeP";
        const LIFF_ID = "2010128406-pWJYT2lK"; 

        let currentDate = new Date();
        let eventsData = {};
        let executivesData = {};
        let currentUserData = null; 
        let currentEditingEventKey = null; 

        window.onload = async () => {
            await fetchDatabase();
            await initializeLiff(); 
            populateFilterDropdown();
            renderCalendar();
        };

        async function fetchDatabase() {
            try {
                const [evRes, exRes] = await Promise.all([ fetch(FIREBASE_URL), fetch(EXECS_URL) ]);
                eventsData = await evRes.json() || {};
                executivesData = await exRes.json() || {};
                for (let key in eventsData) eventsData[key].firebaseKey = key;
            } catch (error) {
                document.getElementById('calendar-grid').innerHTML = `<div class="col-span-7 text-center py-20 text-red-500">ไม่สามารถเชื่อมต่อฐานข้อมูลได้</div>`;
            }
        }

        async function initializeLiff() {
            if (!LIFF_ID) return setAsGuest();
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    if (executivesData && executivesData[profile.userId]) {
                        currentUserData = executivesData[profile.userId];
                        document.getElementById('user-display-name').innerText = profile.displayName;
                        document.getElementById('user-profile-img').src = profile.pictureUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.displayName)}&background=0D8ABC&color=fff`;
                        document.getElementById('login-status-box').className = "text-[10px] text-green-700 font-bold bg-green-100 px-2 py-0.5 rounded-full inline-flex items-center gap-1 mt-0.5 border border-green-200";
                        document.getElementById('login-status-dot').className = "w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse";
                        document.getElementById('login-status-text').innerText = "สิทธิ์: " + currentUserData.role;
                        document.getElementById('status-indicator').className = "absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full";
                        
                        // 🔥 เปิดใช้งานปุ่ม "+ เพิ่มคิวงาน" เฉพาะคนที่มีสิทธิ์
                        document.getElementById('fab-add-event').classList.remove('hidden');
                    } else { setAsGuest(profile); }
                } else {
                    if(liff.isInClient()) liff.login(); else setAsGuest();
                }
            } catch (err) { setAsGuest(); }
        }

        function setAsGuest(profile = null) {
            currentUserData = { role: "บุคคลทั่วไป", uid: "GUEST" };
            document.getElementById('user-display-name').innerText = profile ? profile.displayName : "บุคคลทั่วไป";
            if(profile) document.getElementById('user-profile-img').src = profile.pictureUrl;
            document.getElementById('login-status-text').innerText = "เข้าชมแบบสาธารณะ";
            document.getElementById('login-status-box').className = "text-[10px] text-gray-600 font-bold bg-gray-100 px-2 py-0.5 rounded-full inline-flex items-center gap-1 mt-0.5 border border-gray-200";
            document.getElementById('status-indicator').className = "absolute bottom-0 right-0 w-3 h-3 bg-gray-400 border-2 border-white rounded-full";
        }

        function populateFilterDropdown() {
            const select = document.getElementById('filter-select');
            let names = new Set();
            for(let key in executivesData) {
                if(executivesData[key].fullName && executivesData[key].isActive) names.add(executivesData[key].fullName);
            }
            Array.from(names).sort().forEach(name => { select.innerHTML += `<option value="NAME:${name}">👤 ${name}</option>`; });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = ''; 
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            document.getElementById('current-month-display').innerText = `${monthNames[month]} ${year + 543}`;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            const currentFilter = document.getElementById('filter-select').value;
            const eventsByDate = {};

            for (let key in eventsData) {
                const ev = eventsData[key];
                let canView = false;
                if (!currentUserData || currentUserData.role === "บุคคลทั่วไป") {
                    canView = (ev.visibility === "public" || !ev.visibility); 
                } else if (currentUserData.role === "หัวหน้าบริหาร") {
                    canView = true; 
                } else if (currentUserData.role === "คณะกรรมการ" || currentUserData.role === "ผู้อำนวยการ" || currentUserData.role === "ทีมนำ") {
                    // ถ้าเซ็ตเป็น committee เฉพาะคนล็อกอิน(ที่ไม่ใช่ guest) ถึงเห็นได้
                    canView = (ev.visibility === "public" || !ev.visibility || ev.visibility === "committee" || ev.uid === currentUserData.uid);
                }

                if(canView) {
                    if (!eventsByDate[ev.date]) eventsByDate[ev.date] = [];
                    eventsByDate[ev.date].push(ev);
                }
            }

            for (let i = 0; i < firstDay; i++) { grid.innerHTML += `<div class="p-1 md:p-2"></div>`; }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayOfWeek = new Date(year, month, day).getDay();
                const isToday = (day === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                let dailyEvents = eventsByDate[dateString] || [];

                dailyEvents = dailyEvents.filter(ev => {
                    if (currentFilter === "ALL") return true;
                    if (currentFilter === "ROLE:ทีมนำ" && ev.role === "ทีมนำ") return true;
                    if (currentFilter === "ROLE:ผู้อำนวยการ" && ev.role === "ผู้อำนวยการ") return true;
                    if (currentFilter.startsWith("NAME:") && ev.execName === currentFilter.split(":")[1]) return true;
                    return false;
                });

                dailyEvents.sort((a, b) => {
                    let orderA = a.sortOrder || 999;
                    let orderB = b.sortOrder || 999;
                    if (orderA !== orderB) return orderA - orderB;
                    return (a.timeStart || "00:00").localeCompare(b.timeStart || "00:00");
                });
                
                let statusBadge = isToday ? `<span class="bg-gradient-to-r from-amber-400 to-orange-500 text-white text-[8px] md:text-[10px] px-1.5 md:px-2 py-0.5 rounded-full font-bold shadow-md shadow-orange-200 border border-orange-300 whitespace-nowrap">วันนี้</span>` : (isWeekend ? `<span class="bg-gradient-to-r from-blue-400 to-indigo-400 text-white text-[8px] md:text-[10px] px-1.5 md:px-2 py-0.5 rounded-full font-bold shadow-md shadow-blue-200 border border-blue-300 whitespace-nowrap"><i class="fa-solid fa-bed text-[6px] md:text-[8px]"></i> วันหยุด</span>` : "");
                let countBadge = dailyEvents.length > 0 ? `<span class="bg-blue-100 text-blue-700 text-[8px] md:text-[10px] px-1.5 md:px-2 py-0.5 rounded-md font-extrabold shadow-inner border border-blue-200 whitespace-nowrap hidden sm:inline-block">${dailyEvents.length} งาน</span>` : `<span class="bg-gray-100 text-gray-400 text-[8px] md:text-[10px] px-1.5 md:px-2 py-0.5 rounded-md font-medium border border-gray-200 shadow-inner whitespace-nowrap hidden sm:inline-block">ว่าง</span>`;
                const textColors = ['text-red-500', 'text-gray-700', 'text-gray-700', 'text-gray-700', 'text-gray-700', 'text-gray-700', 'text-purple-500'];

                let dayHTML = `
                    <div class="card-3d border-top-${dayOfWeek} min-h-[120px] md:min-h-[180px]">
                        <div class="p-1.5 md:p-3 pb-1 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-1">
                            <div class="flex items-center gap-1.5 md:gap-2">
                                <span class="text-lg md:text-3xl font-extrabold ${textColors[dayOfWeek]} leading-none drop-shadow-sm">${day}</span>
                                <div class="absolute -top-1 -right-[60px] md:-right-14 z-10">${statusBadge}</div>
                            </div>
                            ${countBadge}
                        </div>
                        <div class="p-1 md:p-2 pt-1 md:pt-3 flex-1 flex flex-col gap-1.5 overflow-y-auto max-h-[250px] md:max-h-[350px] hide-scroll">
                `;

                if (dailyEvents.length > 0) {
                    dailyEvents.forEach(ev => {
                        let borderClass = "border-l-blue-400";
                        let priorityBadge = "";
                        if(ev.priority === "สำคัญ") { borderClass = "border-l-amber-400"; priorityBadge = `<span class="text-[7px] md:text-[8px] bg-amber-100 text-amber-700 px-1 rounded font-bold border border-amber-200">สำคัญ</span>`; }
                        if(ev.priority === "ด่วนที่สุด") { borderClass = "border-l-red-500"; priorityBadge = `<span class="text-[7px] md:text-[8px] bg-red-100 text-red-700 px-1 rounded font-bold border border-red-200">ด่วนที่สุด</span>`; }

                        let visibilityIcon = "";
                        if(ev.visibility === "private") visibilityIcon = `<i class="fa-solid fa-lock text-gray-400" title="ส่วนตัว"></i> `;
                        else if(ev.visibility === "committee") visibilityIcon = `<i class="fa-solid fa-users text-gray-400" title="เฉพาะกรรมการ"></i> `;

                        dayHTML += `
                            <div onclick="openEventModal('${ev.firebaseKey}')" class="event-item rounded-md md:rounded-lg p-1 md:p-2 border-l-[3px] md:border-l-4 ${borderClass} relative group cursor-pointer">
                                <div class="flex items-center gap-1.5 md:gap-2 mb-1">
                                    <img src="${ev.avatar}" class="w-4 h-4 md:w-5 md:h-5 rounded-full shadow-sm ring-1 ring-gray-200">
                                    <div class="font-bold text-gray-800 text-[9px] md:text-xs truncate w-full flex justify-between items-center gap-1">
                                        <span class="truncate">${ev.execName}</span>
                                        ${priorityBadge}
                                    </div>
                                </div>
                                <div class="text-gray-600 font-medium text-[9px] md:text-xs leading-snug mb-1 line-clamp-2 md:line-clamp-3">${visibilityIcon}${ev.title}</div>
                                <div class="text-gray-400 text-[8px] md:text-[10px] flex items-center gap-1 font-medium bg-gray-50/50 rounded py-0.5 px-1 w-max border border-gray-100">
                                    <i class="fa-regular fa-clock text-blue-400"></i> ${ev.timeStart} - ${ev.timeEnd}
                                </div>
                            </div>
                        `;
                    });
                } else {
                    dayHTML += `<div class="flex-1 flex items-center justify-center opacity-40"><i class="fa-solid fa-mug-hot text-xl md:text-2xl text-gray-300"></i></div>`;
                }

                dayHTML += `</div></div>`;
                grid.innerHTML += dayHTML;
            }
        }

        // ==========================================
        // 🚨 5. ฟังก์ชัน Popup ดูและลบงาน
        // ==========================================
        function openEventModal(firebaseKey) {
            const ev = eventsData[firebaseKey];
            if(!ev) return;
            currentEditingEventKey = firebaseKey; 

            const colorBar = document.getElementById('modal-color-bar');
            const badge = document.getElementById('modal-priority-badge');
            if (ev.priority === "สำคัญ") { colorBar.className = "h-2 w-full bg-amber-400"; badge.className = "text-[10px] px-2 py-0.5 rounded border mb-2 inline-block font-bold bg-amber-100 text-amber-700 border-amber-200"; badge.innerText = "สำคัญ"; } 
            else if (ev.priority === "ด่วนที่สุด") { colorBar.className = "h-2 w-full bg-red-500"; badge.className = "text-[10px] px-2 py-0.5 rounded border mb-2 inline-block font-bold bg-red-100 text-red-700 border-red-200"; badge.innerText = "ด่วนที่สุด"; } 
            else { colorBar.className = "h-2 w-full bg-blue-500"; badge.className = "text-[10px] px-2 py-0.5 rounded border mb-2 inline-block font-bold bg-blue-50 text-blue-600 border-blue-200"; badge.innerText = "ทั่วไป"; }

            let visText = ev.visibility === 'private' ? ' (ส่วนตัว)' : (ev.visibility === 'committee' ? ' (เฉพาะกรรมการ)' : '');
            
            document.getElementById('modal-avatar').src = ev.avatar;
            document.getElementById('modal-exec-name').innerText = ev.execName;
            document.getElementById('modal-exec-position').innerText = ev.execPosition || "คณะกรรมการ";
            document.getElementById('modal-title').innerText = ev.title + visText;
            document.getElementById('modal-date').innerText = ev.date;
            document.getElementById('modal-time').innerText = `${ev.timeStart} - ${ev.timeEnd} น.`;
            document.getElementById('modal-room').innerText = ev.room || "ไม่ระบุสถานที่";

            const actionsDiv = document.getElementById('modal-actions');
            if (currentUserData && (currentUserData.role === "หัวหน้าบริหาร" || currentUserData.uid === ev.uid)) {
                actionsDiv.classList.remove('hidden');
            } else {
                actionsDiv.classList.add('hidden');
            }
            document.getElementById('eventModal').classList.add('active');
        }

        async function deleteCurrentEvent() {
            if (!currentEditingEventKey) return;
            if (confirm("⚠️ ยืนยันการยกเลิก/ลบนัดหมายนี้ใช่หรือไม่?")) {
                const actionsDiv = document.getElementById('modal-actions');
                actionsDiv.innerHTML = `<span class="text-sm font-bold text-gray-500"><i class="fa-solid fa-spinner fa-spin"></i> กำลังลบข้อมูล...</span>`;
                try {
                    await fetch(`https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/sadaoExecCalendar/events/${currentEditingEventKey}.json?auth=c0RJi6FNEQfcCur7GddJ12QbleXtzLneiVwNBaeP`, { method: 'DELETE' });
                    closeModal('eventModal'); 
                    await fetchDatabase(); 
                    renderCalendar();
                } catch (error) { alert("เกิดข้อผิดพลาด"); closeModal('eventModal'); }
            }
        }

        // ==========================================
        // ✍️ 6. ฟังก์ชันฟอร์มเพิ่มงานใหม่
        // ==========================================
        function openAddEventModal() {
            if(!currentUserData || currentUserData.uid === "GUEST") return;
            
            // ตั้งค่าวันที่เริ่มต้นในฟอร์มเป็นวันนี้
            document.getElementById('input-date-start').valueAsDate = new Date();
            document.getElementById('input-date-end').valueAsDate = new Date();

            // 🌟 ระบบสวมสิทธิ์: ถ้าเป็น "หัวหน้าบริหาร" ให้ดึงรายชื่อผู้อำนวยการมาให้เลือก
            const roleTargetDiv = document.getElementById('form-role-target');
            const targetSelect = document.getElementById('input-target-user');
            targetSelect.innerHTML = '';

            if (currentUserData.role === "หัวหน้าบริหาร") {
                roleTargetDiv.classList.remove('hidden');
                // ตัวเลือกแรกคือตัวเอง
                targetSelect.innerHTML += `<option value="${currentUserData.uid}">ลงให้ตนเอง (${currentUserData.fullName})</option>`;
                // ค้นหาผู้อำนวยการ
                for(let uid in executivesData) {
                    if(executivesData[uid].role === "ผู้อำนวยการ" && executivesData[uid].isActive) {
                        targetSelect.innerHTML += `<option value="${uid}">👉 สวมสิทธิ์ลงให้: ${executivesData[uid].fullName} (ผู้อำนวยการ)</option>`;
                    }
                }
            } else {
                roleTargetDiv.classList.add('hidden');
                targetSelect.innerHTML = `<option value="${currentUserData.uid}">${currentUserData.fullName}</option>`;
            }

            document.getElementById('addEventModal').classList.add('active');
        }

        async function submitAddEvent(e) {
            e.preventDefault(); // ป้องกันเว็บรีเฟรช
            
            const btn = document.getElementById('btn-submit-event');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> กำลังบันทึก...`;
            btn.disabled = true;

            // 1. ดึงข้อมูลว่าเลือกลงคิวให้ใคร (ดึงสิทธิ์จาก UID นั้นๆ)
            const targetUid = document.getElementById('input-target-user').value;
            const targetUser = executivesData[targetUid] || currentUserData;

            const title = document.getElementById('input-title').value;
            const startDate = document.getElementById('input-date-start').value;
            const endDate = document.getElementById('input-date-end').value;
            const timeStart = document.getElementById('input-time-start').value;
            const timeEnd = document.getElementById('input-time-end').value;
            const room = document.getElementById('input-room').value;
            const priority = document.getElementById('input-priority').value;
            const visibility = document.getElementById('input-visibility').value;

            // 2. คำนวณวันที่ (รองรับลงคิวหลายวัน)
            let currD = new Date(startDate);
            let endD = new Date(endDate);
            let datesArray = [];
            while(currD <= endD) {
                datesArray.push(currD.toISOString().split('T')[0]);
                currD.setDate(currD.getDate() + 1);
            }

            if(datesArray.length === 0) { alert("กรุณาเลือกวันที่ให้ถูกต้อง"); btn.innerHTML = `บันทึกข้อมูล`; btn.disabled=false; return; }

            // 3. วนลูปบันทึกข้อมูลลง Firebase ทีละวัน
            const groupId = 'GRP_WEB_' + new Date().getTime();
            let promises = [];

            datesArray.forEach(singleDate => {
                const newEventId = "EVT_WEB_" + new Date().getTime() + "_" + Math.floor(Math.random() * 1000);
                const finalEvent = {
                    groupId: groupId,
                    uid: targetUser.uid, 
                    execName: targetUser.fullName, 
                    execPosition: targetUser.position,
                    role: targetUser.role,
                    sortOrder: targetUser.sortOrder || 999,
                    avatar: targetUser.picUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(targetUser.fullName)}`,
                    title: title, 
                    date: singleDate, 
                    timeStart: timeStart || "08:30", 
                    timeEnd: timeEnd || "16:30",
                    room: room || "ไม่ระบุ", 
                    priority: priority, 
                    visibility: visibility,
                    timestamp: new Date().toISOString()
                };

                const p = fetch(`https://calendarsadao-default-rtdb.asia-southeast1.firebasedatabase.app/sadaoExecCalendar/events/${newEventId}.json?auth=c0RJi6FNEQfcCur7GddJ12QbleXtzLneiVwNBaeP`, {
                    method: "PUT", contentType: "application/json", body: JSON.stringify(finalEvent)
                });
                promises.push(p);
            });

            try {
                await Promise.all(promises);
                closeModal('addEventModal');
                
                // คืนค่าปุ่ม
                btn.innerHTML = `<i class="fa-solid fa-save"></i> บันทึกข้อมูล`;
                btn.disabled = false;
                document.getElementById('addEventForm').reset();
                
                // รีเฟรชปฏิทิน
                await fetchDatabase();
                renderCalendar();

            } catch(e) {
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
                btn.innerHTML = `<i class="fa-solid fa-save"></i> บันทึกข้อมูล`;
                btn.disabled = false;
            }
        }

        function closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); }
        function loadPreviousMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); }
        function loadNextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }
        function resetToToday() { currentDate = new Date(); renderCalendar(); }
    </script>

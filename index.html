<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Sadao Hospital Executive Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: 'Sarabun', sans-serif; }
        .glass { background: white; border: 1px solid #e2e8f0; }
        .today-card { border: 3px solid #fbbf24; box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-5xl mx-auto">
    <div class="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
        <h1 class="text-2xl font-black text-slate-800">ระบบปฏิทินผู้บริหาร</h1>
        <div class="flex gap-2">
            <button onclick="changeMonth(-1)" class="px-4 py-2 bg-slate-100 rounded-xl font-bold">⬅️</button>
            <span id="monthTitle" class="px-6 py-2 font-black text-blue-700 bg-blue-50 rounded-xl">พฤษภาคม 2569</span>
            <button onclick="changeMonth(1)" class="px-4 py-2 bg-slate-100 rounded-xl font-bold">➡️</button>
            <button onclick="openModal()" class="px-6 py-2 bg-blue-600 text-white font-bold rounded-xl ml-4">➕ เพิ่มงาน</button>
        </div>
    </div>

    <div id="calendarGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
</div>

<script>
    const events = []; // ข้อมูลโหลดจาก Firebase
    const monthNames = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
    let current = new Date();

    function render() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const year = current.getFullYear();
        const month = current.getMonth();
        document.getElementById('monthTitle').innerText = `${monthNames[month]} ${year + 543}`;
        
        const days = new Date(year, month + 1, 0).getDate();
        for(let i=1; i<=days; i++) {
            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const isToday = (new Date().toISOString().slice(0,10) === dateStr);
            
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl ${isToday ? 'today-card bg-white' : 'bg-white border border-slate-200'}`;
            div.innerHTML = `
                <div class="flex justify-between mb-2">
                    <span class="font-black text-lg ${isToday ? 'text-amber-600' : 'text-slate-500'}">${i}</span>
                    ${isToday ? '<span class="bg-amber-100 text-amber-700 text-[10px] px-2 py-0.5 rounded-lg font-bold">วันนี้</span>' : ''}
                </div>
                <div class="text-[11px] text-slate-400">ยังไม่มีนัดหมาย</div>
            `;
            grid.appendChild(div);
        }
    }
    render();
</script>
</body>
</html>
